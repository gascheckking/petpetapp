<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PETVERSE 🔥 | En digital värld</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://emojicdn.elk.sh/🌍">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a2a">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- 3D Background -->
    <div class="universe-bg" id="universeBg"></div>

    <!-- Main App -->
    <div class="app">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="user-info">
                <div class="user-avatar-small" id="topAvatar">🐉</div>
                <div class="user-stats">
                    <div class="stat-badge"><span>🔥</span><span id="topStreak">0</span></div>
                    <div class="stat-badge"><span>💰</span><span id="topCoins">500</span></div>
                    <div class="stat-badge"><span>⚡</span><span id="topEnergy">100</span></div>
                </div>
            </div>
            <div class="stat-badge" id="topLevel">Lv.1</div>
        </div>

        <!-- World Map -->
        <div class="world-map" id="worldMapContainer">
            <div class="map-locations" id="worldMap"></div>
        </div>

        <!-- Main Content Area -->
        <div id="mainContent" class="main-content"></div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" data-nav="world"><span class="nav-icon">🌍</span><span class="nav-label">Världen</span></button>
            <button class="nav-item" data-nav="feed"><span class="nav-icon">🔥</span><span class="nav-label">Flöde</span></button>
            <button class="nav-item" data-nav="camera"><div class="nav-camera"><span>📸</span></div><span class="nav-label">Nytt</span></button>
            <button class="nav-item" data-nav="shop"><span class="nav-icon">🛍️</span><span class="nav-label">Shop</span></button>
            <button class="nav-item" data-nav="profile"><span class="nav-icon">👤</span><span class="nav-label">Min</span></button>
        </div>
    </div>

    <!-- Modals -->
    <div id="cameraModal" class="modal hidden">
        <div class="modal-header"><button class="btn-secondary" onclick="window.closeCamera?.()">← Tillbaka</button><span>📸 Skapa inlägg</span><div style="width:50px"></div></div>
        <div class="modal-content" id="cameraContent"></div>
    </div>
    <div id="chatModal" class="modal hidden">
        <div class="modal-header"><button class="btn-secondary" onclick="window.closeChat?.()">← Tillbaka</button><span>💬 Världschatten</span><div style="width:50px"></div></div>
        <div class="modal-content" id="chatContent"></div>
    </div>
    <div id="battleModal" class="modal hidden">
        <div class="modal-header"><button class="btn-secondary" onclick="window.closeBattle?.()">← Tillbaka</button><span>⚔️ PET BATTLE</span><div style="width:50px"></div></div>
        <div class="modal-content" id="battleContent"></div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/pet.js"></script>
    <script src="js/avatar.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/friends.js"></script>
    <script src="js/quests.js"></script>
    <script src="js/battles.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/social.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/bounties.js"></script>
    <script src="js/world.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
