<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PETPET | Allt-i-ett plattformen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* 3D Background */
        .bg-3d {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 40%, #0a0a2a, #000000);
            z-index: 0;
        }
        .bg-3d::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(57,255,20,0.02) 0px, rgba(57,255,20,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }
        .glow-spot {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(57,255,20,0.15), transparent);
            filter: blur(50px);
            animation: floatGlow 15s ease-in-out infinite;
        }
        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(100px, -50px); }
            66% { transform: translate(-50px, 80px); }
        }

        /* App Container */
        .app {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(57,255,20,0.15);
            z-index: 30;
        }
        .user-stats {
            display: flex;
            gap: 12px;
        }
        .stat-badge {
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid rgba(57,255,20,0.3);
        }
        .stat-badge span:first-child { font-size: 14px; }
        .stat-badge span:last-child { color: #39FF14; }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* TikTok Feed */
        .feed-container {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .feed-container::-webkit-scrollbar { display: none; }
        .feed-item {
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 20px 100px;
        }

        /* Floating Pet Card */
        .pet-card {
            position: absolute;
            top: 80px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 12px 18px;
            text-align: center;
            border: 1px solid rgba(57,255,20,0.3);
            animation: floatPet 3s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes floatPet {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .pet-emoji { font-size: 55px; filter: drop-shadow(0 0 15px #39FF14); }
        .pet-level { font-size: 11px; color: #39FF14; margin-top: 5px; }

        /* Action Bar */
        .action-bar {
            position: absolute;
            right: 16px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 20;
        }
        .action-btn {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.85); }
        .action-icon { font-size: 32px; }
        .action-count { font-size: 11px; color: #fff; margin-top: 4px; }

        /* Post Content */
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .post-name { font-size: 16px; font-weight: bold; color: #fff; }
        .post-time { font-size: 11px; color: rgba(255,255,255,0.6); }
        .post-text { font-size: 18px; font-weight: 500; color: #fff; margin-top: 8px; }
        .post-image { width: 100%; max-height: 300px; border-radius: 20px; margin-top: 12px; object-fit: cover; }

        /* Bottom Navigation */
        .bottom-nav {
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(25px);
            border-top: 1px solid rgba(57,255,20,0.15);
            padding: 8px 20px 20px;
            display: flex;
            z-index: 30;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-icon { font-size: 24px; opacity: 0.5; transition: all 0.2s; }
        .nav-icon.active { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 6px #39FF14); }
        .nav-camera {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            width: 52px;
            height: 52px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -18px;
            box-shadow: 0 0 20px rgba(57,255,20,0.4);
        }
        .nav-label { font-size: 10px; color: #888; margin-top: 2px; }
        .nav-label.active { color: #39FF14; }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 20px;
            display: none;
            background: rgba(0,0,0,0.7);
        }
        .screen.active { display: block; }

        /* Glass Cards */
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Grids */
        .grid-2 {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .grid-item {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px;
            width: calc(50% - 6px);
            text-align: center;
            cursor: pointer;
        }
        .grid-item:active { transform: scale(0.97); }

        /* Shop & Bounty Items */
        .shop-row, .bounty-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* Chat */
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
        }
        .chat-message {
            padding: 8px 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px;
            border-radius: 25px;
            color: #fff;
        }

        /* Battle Arena */
        .battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .battle-pet {
            text-align: center;
            flex: 1;
        }
        .battle-health {
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .battle-health-fill {
            height: 100%;
            background: #39FF14;
            width: 100%;
        }

        /* Profile Stats */
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 20px 0;
        }
        .stat-value { font-size: 28px; font-weight: bold; color: #39FF14; }
        .stat-label { font-size: 10px; color: #888; margin-top: 4px; }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(30px);
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Camera Preview */
        .camera-preview {
            width: 100%;
            max-height: 60vh;
            border-radius: 28px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        /* Hidden */
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-3d">
        <div class="glow-spot" style="top: 10%; left: 20%;"></div>
        <div class="glow-spot" style="bottom: 20%; right: 10%; animation-delay: -5s;"></div>
    </div>

    <div class="app">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="user-stats">
                <div class="stat-badge"><span>🐉</span><span id="levelValue">1</span></div>
                <div class="stat-badge"><span>💰</span><span id="coinsValue">1000</span></div>
                <div class="stat-badge"><span>⚡</span><span id="energyValue">100</span></div>
            </div>
            <div class="stat-badge"><span>🔥</span><span id="streakValue">3</span></div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Feed Container -->
            <div id="feedContainer" class="feed-container"></div>

            <!-- World Screen -->
            <div id="worldScreen" class="screen">
                <div class="glass-card" style="margin-bottom: 16px;">
                    <div style="font-size: 18px; font-weight: bold; margin-bottom: 12px;">🌍 UTFORSKA VÄRLDEN</div>
                    <div id="worldList" class="grid-2"></div>
                </div>
            </div>

            <!-- Shop Screen -->
            <div id="shopScreen" class="screen">
                <div class="glass-card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                        <span style="font-size: 18px; font-weight: bold;">🛍️ SHOP</span>
                        <span class="stat-value" style="font-size: 20px;" id="shopCoins">1000</span>
                    </div>
                    <div id="shopList"></div>
                </div>
                <div class="glass-card" style="margin-top: 16px;">
                    <div style="font-weight: bold; margin-bottom: 12px;">🎟️ RABATTKODER</div>
                    <div id="codesList"></div>
                </div>
            </div>

            <!-- Chat Screen -->
            <div id="chatScreen" class="screen">
                <div class="glass-card">
                    <div style="font-weight: bold; margin-bottom: 12px;">💬 GLOBAL CHATT</div>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Skriv ett meddelande...">
                        <button class="btn-secondary" onclick="sendChatMessage()">Skicka</button>
                    </div>
                </div>
            </div>

            <!-- Bounties Screen -->
            <div id="bountiesScreen" class="screen">
                <div class="glass-card">
                    <div style="font-weight: bold; margin-bottom: 12px;">🎯 AKTIVA UPPDRAG</div>
                    <div id="bountiesList"></div>
                </div>
                <div class="glass-card" style="margin-top: 16px;">
                    <div style="font-weight: bold; margin-bottom: 12px;">📋 MINA UPPDRAG</div>
                    <div id="myBountiesList"></div>
                    <button class="btn-primary" onclick="createBounty()">➕ SKAPA UPPDRAG</button>
                </div>
            </div>

            <!-- Battle Screen -->
            <div id="battleScreen" class="screen">
                <div class="glass-card">
                    <div style="font-weight: bold; margin-bottom: 12px;">⚔️ PET BATTLE ARENA</div>
                    <div id="battleOpponents" class="grid-2"></div>
                    <div id="battleArena" class="hidden">
                        <div class="battle-arena" id="battleContent"></div>
                        <div id="battleActions" class="grid-2"></div>
                    </div>
                </div>
            </div>

            <!-- Profile Screen -->
            <div id="profileScreen" class="screen">
                <div class="glass-card" style="text-align: center;">
                    <div class="pet-emoji" style="font-size: 70px; margin: 10px 0;">🐉</div>
                    <div style="font-size: 20px; font-weight: bold;" id="profileName">Äventyrare</div>
                    <div style="color: #888;" id="profilePetInfo">Eldraken · Level 1</div>
                    
                    <div class="profile-stats">
                        <div><div class="stat-value" id="profileStreak">0</div><div class="stat-label">Streak</div></div>
                        <div><div class="stat-value" id="profileMeetings">0</div><div class="stat-label">Möten</div></div>
                        <div><div class="stat-value" id="profileCoins">1000</div><div class="stat-label">Coins</div></div>
                    </div>
                    <div class="profile-stats">
                        <div><div class="stat-value" id="profileBounties">0</div><div class="stat-label">Uppdrag</div></div>
                        <div><div class="stat-value" id="profileBattles">0</div><div class="stat-label">Vinster</div></div>
                        <div><div class="stat-value" id="profileBadges">0</div><div class="stat-label">Badges</div></div>
                    </div>
                    
                    <div class="glass-card" style="margin: 16px 0;">
                        <div style="font-weight: bold; margin-bottom: 8px;">✨ ABILITIES</div>
                        <div id="abilitiesList" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;"></div>
                    </div>
                    
                    <button class="btn-primary" onclick="shareProfile()">📤 DELA PROFIL</button>
                </div>
            </div>

            <!-- Price Comparison Screen -->
            <div id="compareScreen" class="screen">
                <div class="glass-card">
                    <div style="font-weight: bold; margin-bottom: 12px;">🔍 JÄMFÖR PRISER</div>
                    <input type="text" id="searchProduct" class="chat-input" placeholder="Sök produkt..." style="margin-bottom: 12px;">
                    <button class="btn-primary" onclick="searchPrices()">Sök</button>
                    <div id="priceResults" style="margin-top: 16px;"></div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="switchTab('world')"><span class="nav-icon" id="navWorldIcon">🌍</span><span class="nav-label">Världen</span></button>
            <button class="nav-item" onclick="switchTab('feed')"><span class="nav-icon" id="navFeedIcon">🔥</span><span class="nav-label">Flöde</span></button>
            <button class="nav-item" onclick="openCamera()"><div class="nav-camera"><span>📸</span></div><span class="nav-label">Nytt</span></button>
            <button class="nav-item" onclick="switchTab('shop')"><span class="nav-icon" id="navShopIcon">🛍️</span><span class="nav-label">Shop</span></button>
            <button class="nav-item" onclick="switchTab('profile')"><span class="nav-icon" id="navProfileIcon">👤</span><span class="nav-label">Min</span></button>
        </div>

        <!-- Camera Modal -->
        <div id="cameraModal" class="modal">
            <div class="modal-header">
                <button onclick="closeCamera()" style="background: none; border: none; color: #fff;">← Tillbaka</button>
                <span style="font-weight: bold;">📸 Skapa inlägg</span>
                <div style="width: 50px;"></div>
            </div>
            <div class="modal-content">
                <div style="text-align: center; margin-bottom: 20px;">
                    <button class="btn-secondary" onclick="selectImage()">📷 Välj bild</button>
                </div>
                <img id="previewImage" class="camera-preview hidden">
                <textarea id="postContent" placeholder="Vad händer i din värld? 🔥" rows="3"></textarea>
                <button class="btn-primary" onclick="submitPost()">📤 Publicera</button>
            </div>
        </div>

        <!-- Compare Price Modal -->
        <div id="compareModal" class="modal">
            <div class="modal-header">
                <button onclick="closeCompare()" style="background: none; border: none; color: #fff;">← Tillbaka</button>
                <span style="font-weight: bold;">🔍 Jämför priser</span>
                <div style="width: 50px;"></div>
            </div>
            <div class="modal-content">
                <input type="text" id="compareProduct" class="chat-input" placeholder="Produktnamn..." style="margin-bottom: 12px;">
                <button class="btn-primary" onclick="compareProduct()">Jämför</button>
                <div id="compareResults" style="margin-top: 16px;"></div>
            </div>
        </div>
    </div>

    <script>
        // ============ PET DATA ============
        let user = {
            name: 'Äventyrare',
            petType: 'dragon',
            petLevel: 1,
            petExp: 0,
            coins: 1000,
            energy: 100,
            streak: 3,
            meetings: 12,
            bountiesCompleted: 5,
            battlesWon: 8,
            badges: ['first_post', 'social_butterfly'],
            abilities: ['🔥 Fire Breath', '🪽 Fly']
        };

        // Posts
        let posts = [
            { id: '1', userName: 'Ella', userAvatar: '👩‍🎤', petEmoji: '🐉', content: 'Köpte Fire Wings till min drake! 🔥', likes: 47, timeAgo: '15 min', image: null },
            { id: '2', userName: 'Max', userAvatar: '🧑‍🚀', petEmoji: '🐺', content: 'Level 10! 🎉', likes: 32, timeAgo: '1 tim', image: null }
        ];

        // Shop items
        let shopItems = [
            { id: 's1', name: '🔥 Fire Wings', emoji: '🔥', price: 200, type: 'skin' },
            { id: 's2', name: '✨ Legendary Glow', emoji: '✨', price: 500, type: 'skin' },
            { id: 's3', name: '⚡ XP Boost', emoji: '⚡', price: 100, type: 'powerup' },
            { id: 's4', name: '💊 Health Potion', emoji: '💊', price: 75, type: 'consumable' },
            { id: 's5', name: '👑 Royal Crown', emoji: '👑', price: 800, type: 'skin' }
        ];

        // Discount codes
        let discountCodes = [
            { code: 'WELCOME10', reward: 100, used: false },
            { code: 'DRAGON50', reward: 500, used: false },
            { code: 'PETPET25', reward: 250, used: false }
        ];

        // World locations
        let worldLocations = [
            { name: '🏠 Hemvärlden', users: 127, unlocked: true, reward: 10 },
            { name: '🛍️ Shopping Plaza', users: 45, unlocked: true, reward: 15 },
            { name: '🎯 Uppdragstorget', users: 32, unlocked: true, reward: 20 },
            { name: '⚔️ Battle Arena', users: 18, unlocked: true, reward: 25 },
            { name: '🌲 MagiSkogen', users: 56, unlocked: true, reward: 30 },
            { name: '⛰️ Drakberget', users: 23, unlocked: false, requiredLevel: 10, reward: 100 }
        ];

        // Bounties
        let bounties = [
            { id: 'b1', title: '📸 Fota något blått', reward: 100, status: 'active' },
            { id: 'b2', title: '🏃 Gå 5000 steg', reward: 150, status: 'active' },
            { id: 'b3', title: '☕ Besök ett café', reward: 200, status: 'active' }
        ];
        let userBounties = [];

        // Chat messages
        let chatMessages = [
            { user: 'Ella', message: 'Hej alla! 👋', time: 'just nu' },
            { user: 'Max', message: 'Någon som vill battle? ⚔️', time: '2 min sen' }
        ];

        // Battle opponents
        let battleOpponents = [
            { name: 'Skogsvätte', emoji: '🌲', level: 1, hp: 50, reward: 50 },
            { name: 'Eldsprutare', emoji: '🔥', level: 3, hp: 80, reward: 100 },
            { name: 'Isdemon', emoji: '❄️', level: 5, hp: 120, reward: 200 }
        ];
        let activeBattle = null;

        let selectedImage = null;
        let currentTab = 'feed';

        // ============ SAVE/LOAD ============
        function loadData() {
            const saved = localStorage.getItem('petpet_user');
            if (saved) user = JSON.parse(saved);
            updateUI();
        }
        function saveData() { localStorage.setItem('petpet_user', JSON.stringify(user)); updateUI(); }
        function updateUI() {
            document.getElementById('levelValue').innerText = user.petLevel;
            document.getElementById('coinsValue').innerText = user.coins;
            document.getElementById('energyValue').innerText = user.energy;
            document.getElementById('streakValue').innerText = user.streak;
            document.getElementById('shopCoins').innerText = user.coins;
            document.getElementById('profileName').innerText = user.name;
            document.getElementById('profilePetInfo').innerHTML = `${user.petType === 'dragon' ? 'Eldraken' : 'Skuggvarg'} · Level ${user.petLevel}`;
            document.getElementById('profileStreak').innerText = user.streak;
            document.getElementById('profileMeetings').innerText = user.meetings;
            document.getElementById('profileCoins').innerText = user.coins;
            document.getElementById('profileBounties').innerText = user.bountiesCompleted;
            document.getElementById('profileBattles').innerText = user.battlesWon;
            document.getElementById('profileBadges').innerText = user.badges.length;
            document.getElementById('abilitiesList').innerHTML = user.abilities.map(a => `<span class="stat-badge">${a}</span>`).join('');
        }

        // ============ FEED ============
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = posts.map(post => `
                <div class="feed-item">
                    <div class="pet-card"><div class="pet-emoji">🐉</div><div class="pet-level">Lv.${user.petLevel}</div></div>
                    <div class="action-bar">
                        <div class="action-btn" onclick="likePost('${post.id}')"><div class="action-icon">❤️</div><div class="action-count" id="likes-${post.id}">${post.likes}</div></div>
                        <div class="action-btn" onclick="sharePost('${post.id}')"><div class="action-icon">📤</div></div>
                    </div>
                    <div class="post-content">
                        <div class="post-user"><div class="post-avatar">${post.userAvatar}</div><div><div class="post-name">${post.userName} · ${post.petEmoji}</div><div class="post-time">${post.timeAgo}</div></div></div>
                        <div class="post-text">${post.content}</div>
                        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                    </div>
                </div>
            `).join('');
        }
        function likePost(id) { let p = posts.find(p => p.id === id); if (p) { p.likes++; document.getElementById(`likes-${id}`).innerText = p.likes; } }
        function sharePost(id) { let p = posts.find(p => p.id === id); if (p && navigator.share) navigator.share({ title: 'PETPET', text: p.content }); }

        // ============ WORLD ============
        function renderWorld() {
            document.getElementById('worldList').innerHTML = worldLocations.map(loc => `
                <div class="grid-item" onclick="visitLocation('${loc.name}')">
                    <div style="font-size: 24px;">${loc.name.split(' ')[0]}</div>
                    <div style="font-weight: bold;">${loc.name}</div>
                    <div style="font-size: 11px; color: #888;">👥 ${loc.users}</div>
                    ${!loc.unlocked ? `<div style="color: #ff9900; font-size: 10px;">🔒 Lv.${loc.requiredLevel}</div>` : '<div style="color: #39FF14;">✅</div>'}
                </div>
            `).join('');
        }
        function visitLocation(name) {
            const loc = worldLocations.find(l => l.name === name);
            if (!loc.unlocked && loc.requiredLevel > user.petLevel) { alert(`🔒 Level ${loc.requiredLevel} krävs!`); return; }
            user.coins += loc.reward;
            user.petExp += 5;
            if (user.petExp >= 100) { user.petExp = 0; user.petLevel++; alert(`🎉 LEVEL UP! Level ${user.petLevel}!`); }
            saveData();
            alert(`✨ Du besökte ${name}! +${loc.reward} coins, +5 XP`);
        }

        // ============ SHOP ============
        function renderShop() {
            document.getElementById('shopList').innerHTML = shopItems.map(item => `
                <div class="shop-row"><div><span style="font-size: 24px; margin-right: 10px;">${item.emoji}</span><span style="font-weight: bold;">${item.name}</span></div><button onclick="buyItem('${item.id}', ${item.price})" style="background: linear-gradient(135deg, #39FF14, #ff3333); border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer;">${item.price}💰</button></div>
            `).join('');
            document.getElementById('codesList').innerHTML = discountCodes.map(code => `
                <div class="shop-row"><div><span style="font-weight: bold;">${code.code}</span></div><button onclick="claimCode('${code.code}')" ${code.used ? 'disabled style="opacity:0.5"' : ''} style="background: #39FF14; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer;">Använd</button></div>
            `).join('');
        }
        function buyItem(id, price) { if (user.coins >= price) { user.coins -= price; saveData(); renderShop(); alert(`✅ Köpt!`); } else alert(`❌ Behöver ${price - user.coins} mer!`); }
        function claimCode(code) { let c = discountCodes.find(c => c.code === code); if (c && !c.used) { c.used = true; user.coins += c.reward; saveData(); renderShop(); alert(`✅ +${c.reward} coins!`); } else alert('❌ Ogiltig kod'); }

        // ============ CHAT ============
        function renderChat() {
            document.getElementById('chatMessages').innerHTML = chatMessages.map(m => `<div class="chat-message"><strong>${m.user}</strong> <span style="color:#888; font-size:10px;">${m.time}</span><div>${m.message}</div></div>`).join('');
        }
        function sendChatMessage() {
            let input = document.getElementById('chatInput');
            if (input.value.trim()) {
                chatMessages.push({ user: user.name, message: input.value, time: 'just nu' });
                renderChat();
                input.value = '';
            }
        }

        // ============ BOUNTIES ============
        function renderBounties() {
            document.getElementById('bountiesList').innerHTML = bounties.map(b => `
                <div class="bounty-row"><div><span style="font-weight: bold;">${b.title}</span><div style="font-size: 11px; color: #888;">+${b.reward} coins</div></div><button onclick="claimBounty('${b.id}')" style="background: #39FF14; border: none; padding: 6px 16px; border-radius: 20px;">🎯 Gör</button></div>
            `).join('');
            document.getElementById('myBountiesList').innerHTML = userBounties.length === 0 ? '<div style="color:#888; text-align:center;">Inga uppdrag än</div>' : userBounties.map(b => `<div class="bounty-row"><div>${b.title}</div><span style="color:#39FF14;">+${b.reward}</span></div>`).join('');
        }
        function claimBounty(id) { let b = bounties.find(b => b.id === id); if (b) { userBounties.push(b); user.coins += b.reward; user.bountiesCompleted++; saveData(); renderBounties(); alert(`✅ +${b.reward} coins!`); } }
        function createBounty() { let title = prompt('Uppdragsnamn:'); if(title){ let reward = parseInt(prompt('Belöning (coins):')); bounties.push({ id: 'b'+Date.now(), title: title, reward: reward, status: 'active' }); renderBounties(); } }

        // ============ BATTLE ============
        function renderBattle() {
            document.getElementById('battleOpponents').innerHTML = battleOpponents.map(o => `
                <div class="grid-item" onclick="startBattle('${o.name}')"><div style="font-size: 40px;">${o.emoji}</div><div style="font-weight: bold;">${o.name}</div><div>Lv.${o.level}</div><div style="color:#39FF14;">💰 ${o.reward}</div></div>
            `).join('');
        }
        function startBattle(name) { let opp = battleOpponents.find(o => o.name === name); activeBattle = { opponent: opp, playerHp: 100, opponentHp: opp.hp, log: [] }; document.getElementById('battleOpponents').classList.add('hidden'); document.getElementById('battleArena').classList.remove('hidden'); updateBattleUI(); }
        function updateBattleUI() { if(!activeBattle) return; document.getElementById('battleContent').innerHTML = `<div class="battle-pet"><div>🐉</div><div>Din pet</div><div class="battle-health"><div class="battle-health-fill" style="width:${activeBattle.playerHp}%"></div></div><div>❤️ ${activeBattle.playerHp}/100</div></div><div style="font-size:30px;">VS</div><div class="battle-pet"><div>${activeBattle.opponent.emoji}</div><div>${activeBattle.opponent.name}</div><div class="battle-health"><div class="battle-health-fill" style="width:${(activeBattle.opponentHp/activeBattle.opponent.hp)*100}%"></div></div><div>❤️ ${activeBattle.opponentHp}/${activeBattle.opponent.hp}</div></div>`; document.getElementById('battleActions').innerHTML = `<button class="btn-primary" onclick="battleAttack()">⚔️ Attackera</button>`; }
        function battleAttack() { if(!activeBattle) return; let dmg = Math.floor(Math.random() * 25) + 15; activeBattle.opponentHp -= dmg; if(activeBattle.opponentHp <= 0) { user.coins += activeBattle.opponent.reward; user.battlesWon++; saveData(); alert(`🎉 VINST! Du fick ${activeBattle.opponent.reward} coins!`); activeBattle = null; document.getElementById('battleOpponents').classList.remove('hidden'); document.getElementById('battleArena').classList.add('hidden'); renderBattle(); } else { let enemyDmg = Math.floor(Math.random() * 20) + 10; activeBattle.playerHp -= enemyDmg; if(activeBattle.playerHp <= 0) { alert(`💀 FÖRLUST!`); activeBattle = null; document.getElementById('battleOpponents').classList.remove('hidden'); document.getElementById('battleArena').classList.add('hidden'); } else { updateBattleUI(); } } }

        // ============ CAMERA ============
        function openCamera() { document.getElementById('cameraModal').classList.add('active'); }
        function closeCamera() { document.getElementById('cameraModal').classList.remove('active'); selectedImage = null; document.getElementById('previewImage').classList.add('hidden'); document.getElementById('postContent').value = ''; }
        function selectImage() { let input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => { selectedImage = ev.target.result; document.getElementById('previewImage').src = selectedImage; document.getElementById('previewImage').classList.remove('hidden'); }; reader.readAsDataURL(file); }; input.click(); }
        function submitPost() { let content = document.getElementById('postContent').value; if(!content.trim() && !selectedImage) { alert('Skriv något eller välj en bild!'); return; } let newPost = { id: Date.now().toString(), userName: user.name, userAvatar: '👤', petEmoji: '🐉', content: content || 'Kolla in mitt äventyr! 🔥', likes: 0, timeAgo: 'just nu', image: selectedImage }; posts.unshift(newPost); renderFeed(); closeCamera(); user.coins += 5; saveData(); alert('✅ Inlägg publicerat! +5 coins'); }

        // ============ PRICE COMPARE ============
        function searchPrices() { let product = document.getElementById('searchProduct').value; if(!product) return; document.getElementById('priceResults').innerHTML = `<div class="glass-card"><div>🔍 Söker efter "${product}"...</div><div style="margin-top:8px;">🛍️ Prisjakt: ${Math.floor(Math.random()*500)+200} kr</div><div>🎯 Tradera: ${Math.floor(Math.random()*300)+100} kr</div><div>📦 Amazon: ${Math.floor(Math.random()*400)+250} kr</div></div>`; }

        // ============ PROFILE ============
        function shareProfile() { let text = `🔥 ${user.name} - Level ${user.petLevel}!\n${user.streak} dagars streak!\n${user.coins} coins!\nLadda ner PETPET!`; if(navigator.share) navigator.share({ title: 'PETPET', text: text }); else alert(text); }

        // ============ TAB NAVIGATION ============
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('feedContainer').style.display = 'none';
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(tab === 'feed') { document.getElementById('feedContainer').style.display = 'block'; renderFeed(); }
            else if(tab === 'world') { document.getElementById('worldScreen').classList.add('active'); renderWorld(); }
            else if(tab === 'shop') { document.getElementById('shopScreen').classList.add('active'); renderShop(); }
            else if(tab === 'profile') { document.getElementById('profileScreen').classList.add('active'); }
            const icons = { world:'navWorldIcon', feed:'navFeedIcon', shop:'navShopIcon', profile:'navProfileIcon' };
            Object.values(icons).forEach(i => { let el = document.getElementById(i); if(el) el.classList.remove('active'); });
            let activeIcon = document.getElementById(icons[tab] || 'navFeedIcon');
            if(activeIcon) activeIcon.classList.add('active');
        }

        // ============ INIT ============
        function init() { loadData(); renderFeed(); renderWorld(); renderShop(); renderChat(); renderBounties(); renderBattle(); switchTab('feed'); setInterval(() => { if(document.getElementById('chatScreen').classList.contains('active')) renderChat(); }, 3000); }
        window.switchTab = switchTab; window.likePost = likePost; window.sharePost = sharePost; window.visitLocation = visitLocation; window.buyItem = buyItem; window.claimCode = claimCode; window.sendChatMessage = sendChatMessage; window.claimBounty = claimBounty; window.createBounty = createBounty; window.startBattle = startBattle; window.battleAttack = battleAttack; window.openCamera = openCamera; window.closeCamera = closeCamera; window.selectImage = selectImage; window.submitPost = submitPost; window.searchPrices = searchPrices; window.shareProfile = shareProfile;
        init();
    </script>
</body>
</html>
