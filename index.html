<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PETPET | Ultimate Social Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* Premium Gradient Background */
        .bg-premium {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #0a0a0a 0%, #000000 100%);
            z-index: 0;
        }
        .bg-premium::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: radial-gradient(ellipse at 50% 0%, rgba(57,255,20,0.08), transparent);
            pointer-events: none;
        }

        /* App Container */
        .app {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            z-index: 30;
        }

        /* Stories Row (Snapchat-style) */
        .stories-row {
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .stories-row::-webkit-scrollbar { display: none; }
        .story-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 16px;
            cursor: pointer;
        }
        .story-ring {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
        }
        .story-avatar {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .story-name {
            font-size: 11px;
            color: #fff;
            opacity: 0.8;
        }

        /* Main Feed (TikTok Style) */
        .feed-container {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .feed-container::-webkit-scrollbar { display: none; }
        .feed-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 20px 100px;
        }

        /* Post Header */
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .post-name {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }
        .post-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        .post-text {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            margin-top: 8px;
            line-height: 1.4;
        }
        .post-image {
            width: 100%;
            max-height: 300px;
            border-radius: 24px;
            margin-top: 12px;
            object-fit: cover;
        }

        /* Action Sidebar */
        .action-sidebar {
            position: absolute;
            right: 16px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 20;
        }
        .action-btn {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.85); }
        .action-icon { font-size: 32px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .action-count { font-size: 11px; color: #fff; margin-top: 4px; font-weight: 500; }

        /* Bottom Navigation (WeChat Style) */
        .bottom-nav {
            background: rgba(15,15,20,0.95);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(57,255,20,0.15);
            padding: 8px 20px 20px;
            display: flex;
            z-index: 30;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-icon { font-size: 24px; opacity: 0.5; transition: all 0.2s; }
        .nav-icon.active { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 8px #39FF14); }
        .nav-camera {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            width: 52px;
            height: 52px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -18px;
            box-shadow: 0 0 20px rgba(57,255,20,0.4);
        }
        .nav-label { font-size: 10px; color: #888; margin-top: 2px; }
        .nav-label.active { color: #39FF14; }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            background: #000000;
            display: none;
            z-index: 15;
        }
        .screen.active { display: block; }

        /* Chat Screen */
        .chat-list {
            padding: 16px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.06);
            cursor: pointer;
        }
        .chat-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; color: #fff; margin-bottom: 4px; }
        .chat-preview { font-size: 12px; color: #888; }
        .chat-meta { text-align: right; }
        .chat-time { font-size: 10px; color: #888; }
        .chat-streak { font-size: 12px; color: #39FF14; margin-top: 4px; }

        /* Profile Screen (Instagram Style) */
        .profile-header {
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .profile-avatar-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .profile-stats {
            flex: 1;
            display: flex;
            justify-content: space-around;
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 18px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 12px; color: #888; }
        .profile-bio {
            padding: 0 20px 16px;
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
        }
        .profile-name { font-weight: 600; margin-bottom: 4px; }
        .profile-bio-text { font-size: 13px; color: #888; }

        /* Shop Screen (Amazon Style) */
        .shop-header {
            padding: 16px;
            background: #0a0a0a;
        }
        .search-bar {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
        }
        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 15px;
        }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }
        .product-card {
            background: #0d0d0d;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        .product-emoji { font-size: 48px; margin-bottom: 8px; }
        .product-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .product-price { font-size: 16px; font-weight: bold; color: #39FF14; }

        /* Glass Cards */
        .glass-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 16px;
            margin: 12px;
            border: 0.5px solid rgba(255,255,255,0.05);
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 14px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(30px);
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        .modal-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 20px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-premium"></div>

    <div class="app">
        <!-- Status Bar -->
        <div class="status-bar">
            <span>9:41</span>
            <span>🐉 Lv.1</span>
        </div>

        <!-- Stories Row (Snapchat-style) -->
        <div class="stories-row" id="storiesRow">
            <div class="story-item" onclick="openCamera()">
                <div class="story-ring"><div class="story-avatar">📸</div></div>
                <div class="story-name">Din story</div>
            </div>
        </div>

        <!-- Main Feed Container -->
        <div id="feedContainer" class="feed-container"></div>

        <!-- Chat Screen -->
        <div id="chatScreen" class="screen">
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- Shop Screen -->
        <div id="shopScreen" class="screen">
            <div class="shop-header">
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" id="shopSearch" placeholder="Sök produkter..." onkeyup="searchProducts()">
                </div>
            </div>
            <div class="shop-grid" id="shopGrid"></div>
        </div>

        <!-- Profile Screen -->
        <div id="profileScreen" class="screen">
            <div class="profile-header">
                <div class="profile-avatar-large">🐉</div>
                <div class="profile-stats">
                    <div class="stat-item"><div class="stat-number" id="profilePosts">12</div><div class="stat-label">Inlägg</div></div>
                    <div class="stat-item"><div class="stat-number" id="profileFollowers">143</div><div class="stat-label">Följare</div></div>
                    <div class="stat-item"><div class="stat-number" id="profileFollowing">203</div><div class="stat-label">Följer</div></div>
                </div>
            </div>
            <div class="profile-bio">
                <div class="profile-name" id="profileName">Äventyrare</div>
                <div class="profile-bio-text">🐉 Pet lover | Explorer | Level 1</div>
            </div>
            <div class="glass-card" style="margin: 16px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                    <span style="font-weight: 600;">✨ Mina pets</span>
                    <span style="color: #39FF14;">🐉 Eldraken Lv.1</span>
                </div>
                <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
                    <div style="width: 30%; height: 100%; background: linear-gradient(90deg, #39FF14, #ff3333); border-radius: 2px;"></div>
                </div>
                <div style="font-size: 12px; color: #888; margin-top: 8px;">30/100 XP till nästa level</div>
            </div>
            <button class="btn-primary" style="margin: 16px; width: calc(100% - 32px);" onclick="shareProfile()">📤 Dela profil</button>
        </div>

        <!-- Camera Modal -->
        <div id="cameraModal" class="modal">
            <div class="modal-header">
                <button onclick="closeCamera()" style="background: none; border: none; color: #fff; font-size: 16px;">← Tillbaka</button>
                <span style="font-weight: 600;">📸 Nytt inlägg</span>
                <div style="width: 50px;"></div>
            </div>
            <div class="modal-content">
                <div style="text-align: center; margin-bottom: 20px;">
                    <button class="btn-primary" style="width: auto; padding: 12px 24px;" onclick="selectImage()">📷 Välj bild</button>
                </div>
                <img id="previewImage" class="hidden" style="width: 100%; border-radius: 20px; margin-bottom: 16px;">
                <textarea id="postContent" placeholder="Vad händer? 🔥"></textarea>
                <button class="btn-primary" onclick="submitPost()">📤 Publicera</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="switchTab('feed')">
                <span class="nav-icon" id="navFeedIcon">🔥</span>
                <span class="nav-label" id="navFeedLabel">Flöde</span>
            </button>
            <button class="nav-item" onclick="switchTab('chat')">
                <span class="nav-icon" id="navChatIcon">💬</span>
                <span class="nav-label" id="navChatLabel">Chat</span>
            </button>
            <button class="nav-item" onclick="openCamera()">
                <div class="nav-camera"><span>📸</span></div>
                <span class="nav-label">Nytt</span>
            </button>
            <button class="nav-item" onclick="switchTab('shop')">
                <span class="nav-icon" id="navShopIcon">🛍️</span>
                <span class="nav-label" id="navShopLabel">Shop</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile')">
                <span class="nav-icon" id="navProfileIcon">👤</span>
                <span class="nav-label" id="navProfileLabel">Min</span>
            </button>
        </div>
    </div>

    <script>
        // ============ DATA ============
        let user = { name: 'Äventyrare', petLevel: 1, petExp: 30, coins: 500, streak: 3 };
        
        let posts = [
            { id: '1', userName: 'Ella', userAvatar: '👩‍🎤', petEmoji: '🐉', content: 'Köpte Fire Wings till min drake! 🔥', likes: 47, timeAgo: '15 min', image: null },
            { id: '2', userName: 'Max', userAvatar: '🧑‍🚀', petEmoji: '🐺', content: 'Level 10! Min varg är nu en legend! 🎉', likes: 32, timeAgo: '1 tim', image: null },
            { id: '3', userName: 'Clara', userAvatar: '👩‍💻', petEmoji: '🦊', content: 'Hittade en legendary skin idag! ✨', likes: 89, timeAgo: '3 tim', image: null }
        ];

        let chats = [
            { id: '1', name: 'Stella 🥰', avatar: '🌟', preview: 'Haha ja! 😄', time: '15 min', streak: 103, unread: true },
            { id: '2', name: 'Mackan', avatar: '👨‍💻', preview: 'Jobbar sent idag', time: '2 d', streak: 0, unread: false },
            { id: '3', name: 'Jack ❤️', avatar: '🐶', preview: 'Vi ses imorgon!', time: '17 h', streak: 0, unread: false },
            { id: '4', name: 'Wendela', avatar: '😂', preview: 'Hahaha bästa!', time: '5 h', streak: 143, unread: true },
            { id: '5', name: 'Lilly', avatar: '🦙', preview: 'Kommer du?', time: '6 h', streak: 172, unread: false }
        ];

        let products = [
            { name: '🔥 Fire Wings', emoji: '🔥', price: 199 },
            { name: '✨ Legendary Glow', emoji: '✨', price: 499 },
            { name: '⚡ XP Boost', emoji: '⚡', price: 99 },
            { name: '👑 Royal Crown', emoji: '👑', price: 799 },
            { name: '💊 Health Potion', emoji: '💊', price: 49 },
            { name: '🎨 Custom Skin', emoji: '🎨', price: 299 }
        ];

        let stories = [
            { name: 'Stella', avatar: '🌟', hasStory: true },
            { name: 'Max', avatar: '🧑‍🚀', hasStory: true },
            { name: 'Clara', avatar: '👩‍💻', hasStory: false },
            { name: 'Leo', avatar: '🧑‍🎤', hasStory: true }
        ];

        let selectedImage = null;
        let currentTab = 'feed';

        // ============ RENDER FUNCTIONS ============
        function renderStories() {
            const container = document.getElementById('storiesRow');
            let html = `<div class="story-item" onclick="openCamera()"><div class="story-ring"><div class="story-avatar">📸</div></div><div class="story-name">Din story</div></div>`;
            stories.forEach(s => {
                if(s.hasStory) html += `<div class="story-item"><div class="story-ring"><div class="story-avatar">${s.avatar}</div></div><div class="story-name">${s.name}</div></div>`;
            });
            container.innerHTML = html;
        }

        function renderFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = posts.map(post => `
                <div class="feed-item">
                    <div class="action-sidebar">
                        <div class="action-btn" onclick="likePost('${post.id}')"><div class="action-icon">❤️</div><div class="action-count" id="likes-${post.id}">${post.likes}</div></div>
                        <div class="action-btn" onclick="sharePost('${post.id}')"><div class="action-icon">📤</div></div>
                    </div>
                    <div class="post-content">
                        <div class="post-header">
                            <div class="post-avatar">${post.userAvatar}</div>
                            <div><div class="post-name">${post.userName} · ${post.petEmoji}</div><div class="post-time">${post.timeAgo}</div></div>
                        </div>
                        <div class="post-text">${post.content}</div>
                        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderChats() {
            const container = document.getElementById('chatList');
            container.innerHTML = chats.map(chat => `
                <div class="chat-item">
                    <div class="chat-avatar">${chat.avatar}</div>
                    <div class="chat-info"><div class="chat-name">${chat.name}</div><div class="chat-preview">${chat.preview}</div></div>
                    <div class="chat-meta"><div class="chat-time">${chat.time}</div>${chat.streak > 0 ? `<div class="chat-streak">🔥 ${chat.streak}</div>` : ''}</div>
                </div>
            `).join('');
        }

        function renderShop() {
            const container = document.getElementById('shopGrid');
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick="buyProduct('${p.name}', ${p.price})">
                    <div class="product-emoji">${p.emoji}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price} 💰</div>
                </div>
            `).join('');
        }

        function searchProducts() {
            let search = document.getElementById('shopSearch').value.toLowerCase();
            const container = document.getElementById('shopGrid');
            let filtered = products.filter(p => p.name.toLowerCase().includes(search));
            container.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="buyProduct('${p.name}', ${p.price})">
                    <div class="product-emoji">${p.emoji}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price} 💰</div>
                </div>
            `).join('');
        }

        // ============ ACTIONS ============
        function likePost(id) { let p = posts.find(p => p.id === id); if(p){ p.likes++; document.getElementById(`likes-${id}`).innerText = p.likes; } }
        function sharePost(id) { let p = posts.find(p => p.id === id); if(p && navigator.share) navigator.share({ title: 'PETPET', text: p.content }); }
        function buyProduct(name, price) { if(user.coins >= price) { user.coins -= price; alert(`✅ Du köpte ${name}!`); } else alert(`❌ Behöver ${price - user.coins} mer coins!`); }
        function shareProfile() { let text = `🔥 ${user.name} - Level ${user.petLevel}!\nLadda ner PETPET!`; if(navigator.share) navigator.share({ title: 'PETPET', text: text }); else alert(text); }

        // ============ CAMERA ============
        function openCamera() { document.getElementById('cameraModal').classList.add('active'); }
        function closeCamera() { document.getElementById('cameraModal').classList.remove('active'); selectedImage = null; document.getElementById('previewImage').classList.add('hidden'); document.getElementById('postContent').value = ''; }
        function selectImage() { let input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => { selectedImage = ev.target.result; document.getElementById('previewImage').src = selectedImage; document.getElementById('previewImage').classList.remove('hidden'); }; reader.readAsDataURL(file); }; input.click(); }
        function submitPost() { let content = document.getElementById('postContent').value; if(!content.trim() && !selectedImage) { alert('Skriv något eller välj bild!'); return; } let newPost = { id: Date.now().toString(), userName: user.name, userAvatar: '👤', petEmoji: '🐉', content: content || 'Kolla inlägg! 🔥', likes: 0, timeAgo: 'just nu', image: selectedImage }; posts.unshift(newPost); renderFeed(); closeCamera(); alert('✅ Inlägg publicerat!'); }

        // ============ TAB NAVIGATION ============
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('feedContainer').style.display = 'none';
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(tab === 'feed') { document.getElementById('feedContainer').style.display = 'block'; renderFeed(); }
            else if(tab === 'chat') { document.getElementById('chatScreen').classList.add('active'); renderChats(); }
            else if(tab === 'shop') { document.getElementById('shopScreen').classList.add('active'); renderShop(); }
            else if(tab === 'profile') { document.getElementById('profileScreen').classList.add('active'); }
            const icons = { feed:'navFeedIcon', chat:'navChatIcon', shop:'navShopIcon', profile:'navProfileIcon' };
            Object.values(icons).forEach(i => { let el = document.getElementById(i); if(el) el.classList.remove('active'); });
            let activeIcon = document.getElementById(icons[tab] || 'navFeedIcon');
            if(activeIcon) activeIcon.classList.add('active');
        }

        // ============ INIT ============
        function init() {
