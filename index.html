<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MY PET WORLD 🔥</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://emojicdn.elk.sh/🐉">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .app {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        /* Feed Styles */
        .feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .feed::-webkit-scrollbar {
            display: none;
        }
        .post {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 20px 100px;
        }

        /* Pet Display */
        .pet-container {
            position: absolute;
            top: 80px;
            right: 20px;
            text-align: center;
            z-index: 20;
        }
        .pet-avatar {
            font-size: 90px;
            filter: drop-shadow(0 0 20px rgba(57, 255, 20, 0.6));
            animation: petFloat 3s ease-in-out infinite;
        }
        @keyframes petFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .pet-level {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #39FF14;
            margin-top: 8px;
            border: 1px solid rgba(57,255,20,0.3);
        }
        .pet-name {
            color: #fff;
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.8;
        }

        /* Post Content */
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .post-name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }
        .post-time {
            font-size: 11px;
            color: #888;
        }
        .post-text {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .post-image {
            width: 100%;
            max-height: 300px;
            border-radius: 20px;
            margin-top: 10px;
            object-fit: cover;
        }

        /* Action Sidebar */
        .actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 20;
        }
        .action {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action:active {
            transform: scale(0.85);
        }
        .action-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        .action-count {
            font-size: 11px;
            color: #fff;
            margin-top: 4px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-icon {
            font-size: 24px;
            opacity: 0.5;
            transition: all 0.2s;
        }
        .nav-icon.active {
            opacity: 1;
            transform: scale(1.1);
        }
        .nav-camera {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            width: 52px;
            height: 52px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            box-shadow: 0 0 20px rgba(57,255,20,0.4);
        }
        .nav-label {
            font-size: 10px;
            color: #888;
        }
        .nav-label.active {
            color: #39FF14;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
        }
        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .hidden {
            display: none;
        }

        /* Camera Preview */
        .camera-preview {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-img {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 14px 28px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            color: #fff;
            cursor: pointer;
        }
        .shop-btn, .bounty-btn {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* Shop & Bounty Cards */
        .shop-item, .bounty-card {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .code-box {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            margin-top: 10px;
        }
        .shop-card, .claim-card {
            background: linear-gradient(135deg, rgba(57,255,20,0.1), rgba(255,51,51,0.1));
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(57,255,20,0.3);
        }

        /* Profile Screen */
        .profile-screen, .nearby-screen, .bounties-screen {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }
        .profile-header {
            text-align: center;
            padding: 30px 0;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 16px;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #39FF14;
        }
        .stat-label {
            font-size: 10px;
            color: #888;
        }
        .pet-detail {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .exp-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #39FF14, #ff3333);
            width: 0%;
            transition: width 0.3s;
        }
        .abilities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }
        .ability {
            background: rgba(57,255,20,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(57,255,20,0.3);
        }

        /* Nearby Screen */
        .friends-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .friend-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            width: calc(50% - 6px);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .friend-card:active {
            transform: scale(0.97);
        }
        .meet-btn {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Bounty Status */
        .claim-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 8px;
        }
        .status-approved {
            background: #39FF14;
            color: #000;
        }
        .status-pending {
            background: #ff9900;
            color: #000;
        }
        .status-rejected {
            background: #ff3333;
            color: #fff;
        }

        /* Challenge Card */
        .challenge-card {
            background: linear-gradient(135deg, rgba(57,255,20,0.1), rgba(255,51,51,0.1));
            border-radius: 25px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(57,255,20,0.3);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Feed Container -->
        <div id="feedContainer" class="feed"></div>

        <!-- Shop Modal -->
        <div id="shopModal" class="modal hidden">
            <div class="modal-header">
                <button class="btn-secondary" onclick="closeShop()">Stäng</button>
                <span style="font-weight:bold">🛍️ MY PET SHOP</span>
                <div style="width:50px"></div>
            </div>
            <div class="modal-content" id="shopContent"></div>
        </div>

        <!-- Camera Modal -->
        <div id="cameraModal" class="modal hidden">
            <div class="modal-header">
                <button class="btn-secondary" onclick="closeCamera()">Stäng</button>
                <span style="font-weight:bold">📸 Nytt inlägg</span>
                <div style="width:50px"></div>
            </div>
            <div class="modal-content" style="display:flex; flex-direction:column; align-items:center; justify-content:center">
                <div style="text-align:center">
                    <div style="font-size:60px; margin-bottom:20px">🐾</div>
                    <button class="btn-primary" onclick="selectImage()">Välj bild</button>
                </div>
                <div id="postButtons" style="display:none; margin-top:20px; width:100%">
                    <button class="btn-primary" onclick="submitPost()">📤 Posta</button>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="switchTab('feed')">
                <span class="nav-icon" id="navFeedIcon">🔥</span>
                <span class="nav-label" id="navFeedLabel">Feed</span>
            </button>
            <button class="nav-item" onclick="switchTab('shop')">
                <span class="nav-icon" id="navShopIcon">🛍️</span>
                <span class="nav-label" id="navShopLabel">Shop</span>
            </button>
            <button class="nav-item" onclick="openCamera()">
                <div class="nav-camera"><span>📸</span></div>
                <span class="nav-label">Posta</span>
            </button>
            <button class="nav-item" onclick="switchTab('bounties')">
                <span class="nav-icon" id="navBountiesIcon">🎯</span>
                <span class="nav-label" id="navBountiesLabel">Bounties</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile')">
                <span class="nav-icon" id="navProfileIcon">👤</span>
                <span class="nav-label" id="navProfileLabel">Min</span>
            </button>
        </div>
    </div>

    <script>
        // ============ PET DATA ============
        const PET_TYPES = {
            dragon: { name: 'Eldraken', emoji: '🐉', abilities: ['🔥 Fire Breath', '🪽 Fly', '⚡ Lightning'] },
            wolf: { name: 'Skuggvarg', emoji: '🐺', abilities: ['🌙 Howl', '🏃 Hunt', '👁️ Sense'] },
            phoenix: { name: 'Fenix', emoji: '🔥', abilities: ['✨ Rebirth', '🕊️ Fly', '❤️ Heal'] }
        };

        // ============ USER DATA ============
        let user = {
            id: 'user1',
            name: '',
            petType: 'dragon',
            petLevel: 1,
            petExp: 0,
            coins: 500,
            streak: 0,
            meetings: 0,
            badges: [],
            collectedCodes: []
        };

        // ============ SHOP DATA ============
        let shopItems = [
            { id: 'skin1', name: '🔥 Fire Wings', price: 200, emoji: '🔥', type: 'skin' },
            { id: 'skin2', name: '✨ Legendary Glow', price: 500, emoji: '✨', type: 'skin' },
            { id: 'item1', name: '⚡ XP Boost x2', price: 100, emoji: '⚡', type: 'powerup' }
        ];

        let discountCodes = [
            { code: 'MYPET20', discount: 20, partner: 'Svenska Spel' },
            { code: 'WELCOME10', discount: 10, partner: 'Welcome Deal' }
        ];

        let irlShops = [
            { name: '🐉 Drake Spelbutik', address: 'Tumba Centrum', distance: '500m', discount: '15% rabatt med DRAGON15' },
            { name: '🦊 MagiRäv Café', address: 'Skärholmen', distance: '1.2km', discount: 'Gratis kaffe' },
            { name: '🔥 Fenix Lounge', address: 'Stockholm City', distance: '3km', discount: '10% på alla drycker' }
        ];

        // ============ BOUNTIES DATA ============
        let bounties = [
            {
                id: 'b1',
                title: '📸 Fota något blått',
                description: 'Hitta något blått i verkligheten, fota och ladda upp som bevis!',
                reward: 100,
                rewardType: 'coins',
                creator: 'Ella',
                expires: '2026-06-01',
                claims: [],
                status: 'active'
            },
            {
                id: 'b2',
                title: '🏃 Gå 5000 steg idag',
                description: 'Visa en screenshot från din stegräknare som bevis.',
                reward: 150,
                rewardType: 'coins',
                creator: 'Max',
                expires: '2026-06-15',
                claims: [],
                status: 'active'
            },
            {
                id: 'b3',
                title: '☕ Besök ett café',
                description: 'Fota dig själv på ett café med en kopp kaffe.',
                reward: 200,
                rewardType: 'coins',
                creator: 'MY PET',
                expires: '2026-07-01',
                claims: [],
                status: 'active'
            },
            {
                id: 'b4',
                title: '🎮 Spela in med din pet',
                description: 'Fota din pet (din gosedjur eller teckning) på en cool plats.',
                reward: 300,
                rewardType: 'coins',
                creator: 'Clara',
                expires: '2026-06-20',
                claims: [],
                status: 'active'
            }
        ];

        // ============ MOCK SOCIAL DATA ============
        let posts = [
            { id: 'p1', userId: 'ella', userName: 'Ella', userAvatar: '👩‍🎤', petEmoji: '🐉', content: 'Köpte Fire Wings till min drake! 🔥 Nu kan den flyga!', likes: 47, comments: 12, timeAgo: '15 min', image: null },
            { id: 'p2', userId: 'max', userName: 'Max', userAvatar: '🧑‍🚀', petEmoji: '🐺', content: 'Level 10! Min varg är nu en legend! 🎉', likes: 32, comments: 8, timeAgo: '1 tim', image: null },
            { id: 'p3', userId: 'clara', userName: 'Clara', userAvatar: '👩‍💻', petEmoji: '🦊', content: 'Hittade en legendary skin idag! ✨ Så fin!', likes: 89, comments: 23, timeAgo: '3 tim', image: null }
        ];

        let friends = [
            { id: 'ella', name: 'Ella', avatar: '👩‍🎤', petEmoji: '🐉', petLevel: 12, distance: '300m' },
            { id: 'max', name: 'Max', avatar: '🧑‍🚀', petEmoji: '🐺', petLevel: 8, distance: '800m' },
            { id: 'clara', name: 'Clara', avatar: '👩‍💻', petEmoji: '🦊', petLevel: 5, distance: '1.2km' },
            { id: 'leo', name: 'Leo', avatar: '🧑‍🎤', petEmoji: '🐱', petLevel: 3, distance: '2km' }
        ];

        // ============ LEADERBOARD ============
        let leaderboard = [
            { name: 'Ella', petLevel: 12, streak: 47, coins: 3200 },
            { name: 'Max', petLevel: 8, streak: 32, coins: 2100 },
            { name: 'Clara', petLevel: 5, streak: 28, coins: 1800 },
            { name: 'Leo', petLevel: 3, streak: 15, coins: 900 },
            { name: 'Du', petLevel: 1, streak: 0, coins: 500 }
        ];

        // ============ DAILY CHALLENGE ============
        let dailyChallenge = {
            title: 'Träffa 2 kompisar idag',
            description: 'Möt vänner IRL och få din pet att växa',
            progress: 0,
            required: 2,
            reward: '250 XP + 🎁 Rare Skin'
        };

        // ============ APP STATE ============
        let currentTab = 'feed';
        let selectedImage = null;
        let pendingBountyClaim = null;

        // ============ INIT ============
        function init() {
            const savedUser = localStorage.getItem('mypet_user');
            if (savedUser) {
                user = JSON.parse(savedUser);
            } else {
                let name = prompt('🔥 Välkommen till MY PET WORLD!\n\nVad heter du?', 'Din vän');
                if (name) {
                    user.name = name;
                    saveUser();
                }
            }
            
            const savedBounties = localStorage.getItem('mypet_bounties');
            if (savedBounties) {
                bounties = JSON.parse(savedBounties);
            }
            
            updateLeaderboard();
            renderFeed();
            switchTab('feed');
        }

        function saveUser() {
            localStorage.setItem('mypet_user', JSON.stringify(user));
        }

        function saveBounties() {
            localStorage.setItem('mypet_bounties', JSON.stringify(bounties));
        }

        function updateLeaderboard() {
            const userIndex = leaderboard.findIndex(l => l.name === 'Du');
            if (userIndex !== -1) {
                leaderboard[userIndex] = { name: 'Du', petLevel: user.petLevel, streak: user.streak, coins: user.coins };
            }
            leaderboard.sort((a, b) => b.petLevel - a.petLevel);
        }

        // ============ FEED FUNCTIONS ============
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            if (!container) return;
            
            const pet = PET_TYPES[user.petType];
            
            container.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="pet-container">
                        <div class="pet-avatar">${pet.emoji}</div>
                        <div class="pet-level">Lv.${user.petLevel}</div>
                        <div class="pet-name">${pet.name}</div>
                    </div>
                    
                    <div class="actions">
                        <div class="action" onclick="likePost('${post.id}')">
                            <div class="action-icon">❤️</div>
                            <div class="action-count">${post.likes}</div>
                        </div>
                        <div class="action" onclick="sharePost('${post.id}')">
                            <div class="action-icon">📤</div>
                        </div>
                    </div>
                    
                    <div class="post-content">
                        <div class="post-user">
                            <div class="post-avatar">${post.userAvatar}</div>
                            <div>
                                <div class="post-name">${post.userName} · ${post.petEmoji}</div>
                                <div class="post-time">${post.timeAgo}</div>
                            </div>
                        </div>
                        <div class="post-text">${post.content}</div>
                        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                    </div>
                </div>
            `).join('');
        }

        function likePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.likes++;
                renderFeed();
                const btn = event.currentTarget;
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => btn.style.transform = '', 200);
            }
        }

        function sharePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                const shareText = `🔥 ${post.content}\n\nMin pet är level ${user.petLevel}!\nLadda ner MY PET WORLD!`;
                if (navigator.share) {
                    navigator.share({ title: 'MY PET', text: shareText });
                } else {
                    alert(shareText);
                }
            }
        }

        // ============ SHOP FUNCTIONS ============
        function renderShop() {
            const container = document.getElementById('shopContent');
            if (!container) return;
            
            container.innerHTML = `
                <div style="margin-bottom:20px">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span style="font-size:24px; font-weight:bold">💰 ${user.coins} coins</span>
                        <span style="background:#39FF14; padding:4px 12px; border-radius:20px; color:#000; font-weight:bold">Lv.${user.petLevel}</span>
                    </div>
                </div>
                
                <div style="margin-bottom:25px">
                    <div style="font-weight:bold; margin-bottom:12px">🎟️ RABATTKODER</div>
                    ${discountCodes.map(code => `
                        <div class="code-box">
                            <div style="font-weight:bold">${code.code}</div>
                            <div>${code.discount}% rabatt · ${code.partner}</div>
                            <button class="shop-btn" style="margin-top:8px" onclick="claimCode('${code.code}')">Använd kod</button>
                        </div>
                    `).join('')}
                </div>
                
                <div style="margin-bottom:25px">
                    <div style="font-weight:bold; margin-bottom:12px">🛍️ SHOP</div>
                    ${shopItems.map(item => `
                        <div class="shop-item">
                            <div style="font-size:40px">${item.emoji}</div>
                            <div style="flex:1">
                                <div style="font-weight:bold">${item.name}</div>
                                <div style="font-size:11px; color:#888">${item.price} coins</div>
                            </div>
                            <button class="shop-btn" onclick="buyItem('${item.id}', ${item.price})">Köp</button>
                        </div>
                    `).join('')}
                </div>
                
                <div>
                    <div style="font-weight:bold; margin-bottom:12px">🏪 IRL SHOPS (SPELA IN)</div>
                    ${irlShops.map(shop => `
                        <div class="shop-card">
                            <div style="font-weight:bold">${shop.name}</div>
                            <div style="font-size:12px; color:#888">${shop.address} · ${shop.distance}</div>
                            <div style="font-size:12px; color:#39FF14; margin:8px 0">${shop.discount}</div>
                            <button class="shop-btn" onclick="visitShop('${shop.name}')">🎮 Spela in</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function buyItem(itemId, price) {
            if (user.coins >= price) {
                user.coins -= price;
                saveUser();
                alert(`✅ Du köpte ${shopItems.find(i => i.id === itemId).name}!`);
                renderShop();
                renderProfile();
            } else {
                alert(`❌ Du har inte tillräckligt med coins! (${user.coins}/${price})`);
            }
        }

        function claimCode(code) {
            if (user.collectedCodes.includes(code)) {
                alert('❌ Du har redan använt denna kod!');
                return;
            }
            user.coins += 100;
            user.collectedCodes.push(code);
            saveUser();
            alert(`✅ Kod ${code} inlöst! Du fick 100 coins!`);
            renderShop();
            renderProfile();
        }

        function visitShop(shopName) {
            user.coins += 50;
            user.meetings++;
            user.petExp += 15;
            
            if (user.petExp >= 100) {
                user.petExp = 0;
                user.petLevel++;
                alert(`🎉 LEVEL UP! Din ${PET_TYPES[user.petType].name} är nu level ${user.petLevel}!`);
            }
            
            saveUser();
            alert(`🎮 Du besökte ${shopName}! +50 coins och +15 XP!`);
            renderShop();
            renderProfile();
        }

        function openShop() {
            renderShop();
            document.getElementById('shopModal').classList.remove('hidden');
        }

        function closeShop() {
            document.getElementById('shopModal').classList.add('hidden');
        }

        // ============ BOUNTY FUNCTIONS ============
        function renderBounties() {
            const container = document.getElementById('bountiesContainer');
            if (!container) return;
            
            const myClaims = [];
            bounties.forEach(bounty => {
                bounty.claims.forEach(claim => {
                    if (claim.userId === user.id) {
                        myClaims.push({ ...claim, bountyTitle: bounty.title, reward: bounty.reward });
                    }
                });
            });
            
            container.innerHTML = `
                <div style="margin-bottom:20px">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span style="font-size:20px; font-weight:bold">🎯 AKTIVA BOUNTIES</span>
                        <span style="background:#39FF14; padding:4px 12px; border-radius:20px; color:#000; font-weight:bold">💰 ${user.coins} coins</span>
                    </div>
                </div>
                
                ${bounties.filter(b => b.status === 'active').map(bounty => `
                    <div class="bounty-card" style="flex-direction:column; align-items:flex-start">
                        <div style="display:flex; justify-content:space-between; width:100%">
                            <span style="font-weight:bold; font-size:16px">${bounty.title}</span>
                            <span style="color:#39FF14; font-weight:bold">+${bounty.reward} ${bounty.rewardType === 'coins' ? 'coins' : bounty.rewardType}</span>
                        </div>
                        <div style="font-size:12px; color:#888; margin:5px 0">${bounty.description}</div>
                        <div style="font-size:10px; color:#555">Skapad av: ${bounty.creator} · Exp: ${bounty.expires}</div>
                        <button class="bounty-btn" style="margin-top:10px" onclick="claimBounty('${bounty.id}')">🎯 Gör bounty</button>
                    </div>
                `).join('')}
                
                <div style="margin:25px 0">
                    <div style="font-weight:bold; margin-bottom:12px">📋 MINA CLAIMS</div>
                    <div id="myClaimsList">
                        ${myClaims.length === 0 ? '<div style="color:#555; text-align:center">Inga claims än</div>' : 
                            myClaims.map(claim => `
                                <div class="claim-card">
                                    <div style="font-weight:bold">${claim.bountyTitle}</div>
                                    <div style="font-size:12px; color:#888">${claim.description || 'Ingen beskrivning'}</div>
                                    <div>
                                        <span class="claim-status ${claim.status === 'approved' ? 'status-approved' : claim.status === 'rejected' ? 'status-rejected' : 'status-pending'}">
                                            ${claim.status === 'approved' ? '✅ Godkänd' : claim.status === 'rejected' ? '❌ Avslagen' : '⏳ Väntar'}
                                        </span>
                                    </div>
                                    ${claim.status === 'approved' ? `<div style="color:#39FF14; margin-top:5px">+${claim.reward} coins!</div>` : ''}
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
                
                <div style="margin-top:25px">
                    <button class="btn-primary" onclick="createBounty()">➕ SKAPA EGEN BOUNTY</button>
                </div>
            `;
        }

        function claimBounty(bountyId) {
            let bounty = bounties.find(b => b.id === bountyId);
            if (!bounty) return;
            
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = (event) => {
                    let proofImage = event.target.result;
                    let description = prompt('Beskriv din claim (valfritt):', 'Jag gjorde utmaningen!');
                    
                    let claim = {
                        id: Date.now().toString(),
                        bountyId: bounty.id,
                        userId: user.id,
                        userName: user.name,
                        proofImage: proofImage,
                        description: description || '',
                        timestamp: new Date().toISOString(),
                        status: 'pending'
                    };
                    
                    bounty.claims.push(claim);
                    saveBounties();
                    alert(`✅ Din claim är inskickad! Väntar på verifiering från bounty-skaparen.`);
                    renderBounties();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function createBounty() {
            let title = prompt('Vad heter bounty?', '📸 Fota något coolt');
            if (!title) return;
            
            let description = prompt('Beskriv vad man ska göra:', 'Fota och ladda upp bevis');
            if (!description) return;
            
            let reward = parseInt(prompt('Belöning i coins:', '100'));
            if (isNaN(reward)) return;
            
            let newBounty = {
                id: 'b' + Date.now(),
                title: title,
                description: description,
                reward: reward,
                rewardType: 'coins',
                creator: user.name,
                expires: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0],
                claims: [],
                status: 'active'
            };
            
            bounties.push(newBounty);
            saveBounties();
            alert(`✅ Bounty "${title}" skapad! Belöning: ${reward} coins`);
            renderBounties();
        }

        function verifyClaim(bountyId, claimId, approved) {
            let bounty = bounties.find(b => b.id === bountyId);
            let claim = bounty.claims.find(c => c.id === claimId);
            
            if (approved) {
                claim.status = 'approved';
                if (bounty.rewardType === 'coins') {
                    user.coins += bounty.reward;
                    alert(`✅ Claim godkänd! ${user.name} fick ${bounty.reward} coins!`);
                }
                saveUser();
            } else {
                claim.status = 'rejected';
                alert(`❌ Claim avslogs.`);
            }
            
            saveBounties();
            renderBounties();
            renderProfile();
        }

        // ============ PROFILE FUNCTIONS ============
        function renderProfile() {
            const container = document.getElementById('profileContainer');
            if (!container) return;
            
            const pet = PET_TYPES[user.petType];
            const expPercent = (user.petExp / 100) * 100;
            
            // Get user's claims
            const myClaims = [];
            bounties.forEach(bounty => {
                bounty.claims.forEach(claim => {
                    if (claim.userId === user.id) {
                        myClaims.push({ ...claim, bountyTitle: bounty.title, reward: bounty.reward });
                    }
                });
            });
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${pet.emoji}</div>
                    <div style="font-size:24px; font-weight:bold">${user.name}</div>
                    <div style="color:#888">${pet.name} · Level ${user.petLevel}</div>
                </div>
                
                <div class="stats-row">
                    <div class="stat">
                        <div class="stat-value">${user.streak}</div>
                        <div class="stat-label">Streak</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${user.meetings}</div>
                        <div class="stat-label">Möten</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${user.coins}</div>
                        <div class="stat-label">Coins</div>
                    </div>
                </div>
                
                <div class="pet-detail">
                    <div class="exp-bar">
                        <div class="exp-fill" style="width:${expPercent}%"></div>
                    </div>
                    <div>${user.petExp}/100 XP till level ${user.petLevel + 1}</div>
                    <div class="abilities">
                        ${pet.abilities.map(a => `<span class="ability">${a}</span>`).join('')}
                    </div>
                </div>
                
                <div style="margin:20px 0">
                    <div style="font-weight:bold; margin-bottom:12px">📋 MINA BOUNTY CLAIMS</div>
                    <div id="profileClaimsList">
                        ${myClaims.length === 0 ? '<div style="color:#555; text-align:center; padding:20px">Inga claims än</div>' : 
                            myClaims.map(claim => `
                                <div class="claim-card">
                                    <div style="font-weight:bold">${claim.bountyTitle}</div>
                                    <div style="font-size:12px; color:#888">${claim.description || 'Ingen beskrivning'}</div>
                                    <div>
                                        <span class="claim-status ${claim.status === 'approved' ? 'status-approved' : claim.status === 'rejected' ? 'status-rejected' : 'status-pending'}">
                                            ${claim.status === 'approved' ? '✅ Godkänd' : claim.status === 'rejected' ? '❌ Avslagen' : '⏳ Väntar'}
                                        </span>
                                    </div>
                                    ${claim.status === 'approved' ? `<div style="color:#39FF14; margin-top:5px">+${claim.reward} coins!</div>` : ''}
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
                
                <div style="margin:20px 0">
                    <div style="font-weight:bold; margin-bottom:12px">🏆 TOPPLISTA</div>
                    ${leaderboard.map((item, idx) => `
                        <div style="display:flex; align-items:center; gap:12px; padding:10px; background:rgba(255,255,255,0.03); border-radius:15px; margin-bottom:8px">
                            <div style="width:35px; font-size:18px; font-weight:bold; color:#39FF14">${idx === 0 ? '👑' : idx === 1 ? '⭐' : idx === 2 ? '🔥' : `${idx+1}`}</div>
                            <div style="flex:1">${item.name}</div>
                            <div style="color:#39FF14">Lv.${item.petLevel}</div>
                            <div style="font-size:11px; color:#888">${item.streak}d</div>
                        </div>
                    `).join('')}
                </div>
                
                <button class="btn-primary" onclick="shareProfile()">📤 DELA PROFIL</button>
            `;
        }

        function shareProfile() {
            const pet = PET_TYPES[user.petType];
            const shareText = `🔥 ${user.name} - ${pet.name} Level ${user.petLevel}!\n${user.streak} dagars streak!\n${user.meetings} IRL-möten!\n${user.coins} coins!\n\nLadda ner MY PET WORLD!`;
            if (navigator.share) {
                navigator.share({ title: 'MY PET', text: shareText });
            } else {
                alert(shareText);
            }
        }

        // ============ NEARBY FUNCTIONS ============
        function meetFriend(friendName) {
            user.meetings++;
            user.streak++;
            user.petExp += 15;
            
            if (user.petExp >= 100) {
                user.petExp = 0;
                user.petLevel++;
                alert(`🎉 LEVEL UP! Din ${PET_TYPES[user.petType].name} är nu level ${user.petLevel}!`);
            }
            
            dailyChallenge.progress = Math.min(dailyChallenge.progress + 1, dailyChallenge.required);
            
            if (dailyChallenge.progress >= dailyChallenge.required) {
                user.petExp += 250;
                alert(`🔥 UTMANING KLAR! Du fick: ${dailyChallenge.reward} + 250 XP!`);
                dailyChallenge.progress = 0;
                
                if (user.petExp >= 100) {
                    user.petExp -= 100;
                    user.petLevel++;
                    alert(`🎉 LEVEL UP! Din ${PET_TYPES[user.petType].name} är nu level ${user.petLevel}!`);
                }
            }
            
            if (user.meetings >= 10 && !user.badges.includes('social')) {
                user.badges.push('social');
                alert('🏆 NY BADGE! Social Butterfly - 10 IRL-möten!');
            }
            if (user.streak >= 7 && !user.badges.includes('streak7')) {
                user.badges.push('streak7');
                alert('🏆 NY BADGE! On Fire - 7 dagars streak!');
            }
            
            saveUser();
            updateLeaderboard();
            renderNearby();
            renderProfile();
            alert(`✅ Du mötte ${friendName}! +15 XP till din pet`);
            renderFeed();
        }

        function renderNearby() {
            const container = document.getElementById('nearbyContainer');
            if (!container) return;
            
            const questPercent = (dailyChallenge.progress / dailyChallenge.required) * 100;
            
            container.innerHTML = `
                <div class="challenge-card">
                    <div style="font-size:12px; color:#39FF14">⚡️ DAGENS UTMANING</div>
                    <div style="font-size:16px; font-weight:bold; margin:8px 0">${dailyChallenge.title}</div>
                    <div style="font-size:12px; color:#888; margin-bottom:12px">${dailyChallenge.description}</div>
                    <div class="exp-bar">
                        <div class="exp-fill" style="width:${questPercent}%"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:8px">
                        <span>${dailyChallenge.progress}/${dailyChallenge.required}</span>
                        <span style="color:#39FF14">🎁 ${dailyChallenge.reward}</span>
                    </div>
                </div>
                
                <div style="margin-bottom:15px">
                    <div style="font-weight:bold; margin-bottom:12px">📍 VÄNNER I NÄRHETEN</div>
                    <div class="friends-grid">
                        ${friends.map(friend => `
                            <div class="friend-card" onclick="meetFriend('${friend.name}')">
                                <div style="font-size:50px">${friend.avatar}</div>
                                <div style="font-weight:bold; margin:8px 0">${friend.name}</div>
                                <div>${friend.petEmoji} Lv.${friend.petLevel}</div>
                                <div style="font-size:11px; color:#888; margin:5px 0">${friend.distance}</div>
                                <button class="meet-btn">🤝 MÖT</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // ============ CAMERA FUNCTIONS ============
        function openCamera() {
            document.getElementById('cameraModal').classList.remove('hidden');
        }

        function closeCamera() {
            document.getElementById('cameraModal').classList.add('hidden');
            selectedImage = null;
            document.getElementById('postButtons').style.display = 'none';
            document.querySelector('#cameraModal .modal-content').innerHTML = `
                <div style="text-align:center">
                    <div style="font-size:60px; margin-bottom:20px">🐾</div>
                    <button class="btn-primary" onclick="selectImage()">Välj bild</button>
                </div>
            `;
        }

        function selectImage() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = (event) => {
                    selectedImage = event.target.result;
                    const modalContent = document.querySelector('#cameraModal .modal-content');
                    modalContent.innerHTML = `
                        <img src="${selectedImage}" class="preview-img">
                        <div style="display:flex; gap:15px; margin-top:20px; justify-content:center">
                            <button class="btn-secondary" onclick="clearImage()">Ta bort</button>
                            <button class="btn-primary" onclick="submitPost()">📤 Posta</button>
                        </div>
                    `;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function clearImage() {
            selectedImage = null;
            const modalContent = document.querySelector('#cameraModal .modal-content');
            modalContent.innerHTML = `
                <div style="text-align:center">
                    <div style="font-size:60px; margin-bottom:20px">🐾</div>
                    <button class="btn-primary" onclick="selectImage()">Välj bild</button>
                </div>
            `;
        }

        function submitPost() {
            if (selectedImage) {
                const newPost = {
                    id: Date.now().toString(),
                    userId: user.id,
                    userName: user.name,
                    userAvatar: '👤',
                    petEmoji: PET_TYPES[user.petType].emoji,
                    content: 'Kolla in mitt äventyr! 🔥',
                    likes: 0,
                    comments: 0,
                    timeAgo: 'just nu',
                    image: selectedImage
                };
                posts.unshift(newPost);
                selectedImage = null;
                closeCamera();
                renderFeed();
                switchTab('feed');
                alert('✅ Inlägg postat!');
            }
        }

        // ============ TAB NAVIGATION ============
        function switchTab(tab) {
            currentTab = tab;
            
            // Hide all main views
            document.getElementById('feedContainer').style.display = 'none';
            
            // Create screens if they don't exist
            if (!document.getElementById('nearbyScreen')) {
                const div = document.createElement('div');
                div.id = 'nearbyScreen';
                div.className = 'nearby-screen';
                div.style.display = 'none';
                div.innerHTML = '<div id="nearbyContainer"></div>';
                document.querySelector('.app').insertBefore(div, document.querySelector('.bottom-nav'));
            }
            if (!document.getElementById('profileScreen')) {
                const div = document.createElement('div');
                div.id = 'profileScreen';
                div.className = 'profile-screen';
                div.style.display = 'none';
                div.innerHTML = '<div id="profileContainer"></div>';
                document.querySelector('.app').insertBefore(div, document.querySelector('.bottom-nav'));
            }
            if (!document.getElementById('bountiesScreen')) {
                const div = document.createElement('div');
                div.id = 'bountiesScreen';
                div.className = 'bounties-screen';
                div.style.display = 'none';
                div.innerHTML = '<div id="bountiesContainer"></div>';
                document.querySelector('.app').insertBefore(div, document.querySelector('.bottom-nav'));
            }
            
            const nearbyScreen = document.getElementById('nearbyScreen');
            const profileScreen = document.getElementById('profileScreen');
            const bountiesScreen = document.getElementById('bountiesScreen');
            
            if (nearbyScreen) nearbyScreen.style.display = 'none';
            if (profileScreen) profileScreen.style.display = 'none';
            if (bountiesScreen) bountiesScreen.style.display = 'none';
            
            if (tab === 'feed') {
                document.getElementById('feedContainer').style.display = 'block';
                renderFeed();
            } else if (tab === 'nearby') {
                if (nearbyScreen) {
                    nearbyScreen.style.display = 'block';
                    renderNearby();
                }
            } else if (tab === 'profile') {
                if (profileScreen) {
                    profileScreen.style.display = 'block';
                    renderProfile();
                }
            } else if (tab === 'bounties') {
                if (bountiesScreen) {
                    bountiesScreen.style.display = 'block';
                    renderBounties();
                }
            } else if (tab === 'shop') {
                openShop();
                return;
            }
            
            // Update navigation icons
            const icons = { feed: 'navFeedIcon', nearby: 'navNearbyIcon', profile: 'navProfileIcon', bounties: 'navBountiesIcon', shop: 'navShopIcon' };
            const labels = { feed: 'navFeedLabel', nearby: 'navNearbyLabel', profile: 'navProfileLabel', bounties: 'navBountiesLabel', shop: 'navShopLabel' };
            
            Object.keys(icons).forEach(t => {
                const icon = document.getElementById(icons[t]);
                const label = document.getElementById(labels[t]);
                if (icon) icon.classList.remove('active');
                if (label) label.classList.remove('active');
            });
            
            const activeIcon = document.getElementById(icons[tab]);
            const activeLabel = document.getElementById(labels[tab]);
            if (activeIcon) activeIcon.classList.add('active');
            if (activeLabel) activeLabel.classList.add('active');
        }

        // Start the app
        init();
    </script>
</body>
</html>
