<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PETPET | Mega Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* 3D Background Effect */
        .bg-3d {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 40%, #0a0a2a, #000000);
            z-index: 0;
        }
        .bg-3d::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(57,255,20,0.02) 0px, rgba(57,255,20,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }
        .glow-spot {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(57,255,20,0.15), transparent);
            filter: blur(50px);
            animation: floatGlow 15s ease-in-out infinite;
        }
        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(100px, -50px); }
            66% { transform: translate(-50px, 80px); }
        }

        /* App Container */
        .app {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Top Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            z-index: 30;
        }

        /* Main Feed (TikTok Style) */
        .feed-container {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .feed-container::-webkit-scrollbar { display: none; }
        
        .feed-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 20px 120px;
        }

        /* Floating Pet Card */
        .pet-card {
            position: absolute;
            top: 100px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 12px 18px;
            text-align: center;
            border: 1px solid rgba(57,255,20,0.3);
            box-shadow: 0 0 30px rgba(57,255,20,0.2);
            animation: floatPet 3s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes floatPet {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .pet-emoji { font-size: 55px; filter: drop-shadow(0 0 15px #39FF14); }
        .pet-level { font-size: 11px; color: #39FF14; margin-top: 5px; font-weight: bold; }

        /* Action Buttons Sidebar */
        .action-bar {
            position: absolute;
            right: 16px;
            bottom: 140px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 20;
        }
        .action-btn {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.85); }
        .action-icon { font-size: 32px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .action-count { font-size: 11px; color: #fff; margin-top: 4px; font-weight: 500; }

        /* Post Content */
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .post-name { font-size: 16px; font-weight: bold; color: #fff; }
        .post-time { font-size: 11px; color: rgba(255,255,255,0.6); }
        .post-text { font-size: 18px; font-weight: 500; color: #fff; margin-top: 8px; line-height: 1.4; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* Bottom Navigation (WeChat Style) */
        .bottom-nav {
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(25px);
            border-top: 1px solid rgba(57,255,20,0.15);
            padding: 8px 20px 20px;
            display: flex;
            z-index: 30;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-icon { font-size: 24px; opacity: 0.5; transition: all 0.2s; }
        .nav-icon.active { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 6px #39FF14); }
        .nav-camera {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            width: 52px;
            height: 52px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -18px;
            box-shadow: 0 0 20px rgba(57,255,20,0.4);
        }
        .nav-label { font-size: 10px; color: #888; margin-top: 2px; }
        .nav-label.active { color: #39FF14; }

        /* Content Screens */
        .screen {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }
        .screen.active { display: block; }

        /* Glass Cards */
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Grid Layouts */
        .grid-2 {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .grid-item {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px;
            width: calc(50% - 6px);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .grid-item:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }

        /* Shop Items */
        .shop-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* Profile Stats */
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 20px 0;
        }
        .stat-value { font-size: 28px; font-weight: bold; color: #39FF14; }
        .stat-label { font-size: 10px; color: #888; margin-top: 4px; }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(30px);
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-3d">
        <div class="glow-spot" style="top: 10%; left: 20%;"></div>
        <div class="glow-spot" style="bottom: 20%; right: 10%; animation-delay: -5s;"></div>
    </div>

    <div class="app">
        <!-- Status Bar -->
        <div class="status-bar">
            <span>9:41</span>
            <span>🐉 Lv.1</span>
        </div>

        <!-- TikTok Feed Container -->
        <div id="feedContainer" class="feed-container"></div>

        <!-- World Screen -->
        <div id="worldScreen" class="screen">
            <div class="glass-card" style="margin-bottom: 16px;">
                <div style="font-size: 18px; font-weight: bold; margin-bottom: 12px;">🌍 UTFORSKA VÄRLDEN</div>
                <div id="worldList"></div>
            </div>
        </div>

        <!-- Shop Screen -->
        <div id="shopScreen" class="screen">
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                    <span style="font-size: 18px; font-weight: bold;">🛍️ SHOP</span>
                    <span class="stat-value" style="font-size: 20px;" id="shopCoins">500</span>
                </div>
                <div id="shopList"></div>
            </div>
        </div>

        <!-- Profile Screen -->
        <div id="profileScreen" class="screen">
            <div class="glass-card" style="text-align: center;">
                <div class="pet-emoji" style="font-size: 70px; margin: 10px 0;">🐉</div>
                <div style="font-size: 20px; font-weight: bold;" id="profileName">Äventyrare</div>
                <div style="color: #888;">Eldraken · Level 1</div>
                
                <div class="profile-stats">
                    <div><div class="stat-value" id="profileStreak">0</div><div class="stat-label">Streak</div></div>
                    <div><div class="stat-value" id="profileMeetings">0</div><div class="stat-label">Möten</div></div>
                    <div><div class="stat-value" id="profileCoins">500</div><div class="stat-label">Coins</div></div>
                </div>
                
                <button class="btn-primary" onclick="shareProfile()">📤 DELA PROFIL</button>
            </div>
        </div>

        <!-- Camera Modal -->
        <div id="cameraModal" class="modal">
            <div class="modal-header">
                <button onclick="closeCamera()" style="background: none; border: none; color: #fff; font-size: 16px;">← Tillbaka</button>
                <span style="font-weight: bold;">📸 Nytt inlägg</span>
                <div style="width: 50px;"></div>
            </div>
            <div class="modal-content">
                <textarea id="postInput" placeholder="Vad händer i din värld? 🔥"></textarea>
                <button class="btn-primary" onclick="createPost()">📤 Publicera</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="switchTab('world')">
                <span class="nav-icon" id="navWorldIcon">🌍</span>
                <span class="nav-label" id="navWorldLabel">Världen</span>
            </button>
            <button class="nav-item" onclick="switchTab('feed')">
                <span class="nav-icon" id="navFeedIcon">🔥</span>
                <span class="nav-label" id="navFeedLabel">Flöde</span>
            </button>
            <button class="nav-item" onclick="openCamera()">
                <div class="nav-camera"><span>📸</span></div>
                <span class="nav-label">Nytt</span>
            </button>
            <button class="nav-item" onclick="switchTab('shop')">
                <span class="nav-icon" id="navShopIcon">🛍️</span>
                <span class="nav-label" id="navShopLabel">Shop</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile')">
                <span class="nav-icon" id="navProfileIcon">👤</span>
                <span class="nav-label" id="navProfileLabel">Min</span>
            </button>
        </div>
    </div>

    <script>
        // ============ APP STATE ============
        let currentTab = 'feed';
        let user = {
            name: 'Äventyrare',
            coins: 500,
            energy: 100,
            level: 1,
            exp: 0,
            streak: 3,
            meetings: 12,
            bountiesCompleted: 5,
            battlesWon: 8
        };

        // Posts data
        let posts = [
            { id: '1', userName: 'Ella', userAvatar: '👩‍🎤', petEmoji: '🐉', content: 'Köpte Fire Wings till min drake! 🔥 Nu kan den flyga!', likes: 47, timeAgo: '15 min' },
            { id: '2', userName: 'Max', userAvatar: '🧑‍🚀', petEmoji: '🐺', content: 'Level 10! Min varg är nu en legend! 🎉', likes: 32, timeAgo: '1 tim' },
            { id: '3', userName: 'Clara', userAvatar: '👩‍💻', petEmoji: '🦊', content: 'Hittade en legendary skin idag! ✨ Så fin!', likes: 89, timeAgo: '3 tim' },
            { id: '4', userName: 'Leo', userAvatar: '🧑‍🎤', petEmoji: '🐱', content: 'Battle arena är öppen! Någon som vill fightas? ⚔️', likes: 23, timeAgo: '5 tim' }
        ];

        // Shop items
        let shopItems = [
            { id: 's1', name: '🔥 Fire Wings', emoji: '🔥', price: 200 },
            { id: 's2', name: '✨ Legendary Glow', emoji: '✨', price: 500 },
            { id: 's3', name: '⚡ XP Boost', emoji: '⚡', price: 100 },
            { id: 's4', name: '💊 Health Potion', emoji: '💊', price: 75 }
        ];

        // World locations
        let worldLocations = [
            { name: '🏠 Hemvärlden', users: 127, unlocked: true, requiredLevel: 1 },
            { name: '🛍️ Shopping Plaza', users: 45, unlocked: true, requiredLevel: 1 },
            { name: '🎯 Uppdragstorget', users: 32, unlocked: true, requiredLevel: 1 },
            { name: '⚔️ Battle Arena', users: 18, unlocked: true, requiredLevel: 3 },
            { name: '🌲 MagiSkogen', users: 56, unlocked: true, requiredLevel: 2 },
            { name: '⛰️ Drakberget', users: 23, unlocked: false, requiredLevel: 10 }
        ];

        // ============ SAVE/LOAD ============
        function loadData() {
            const saved = localStorage.getItem('petpet_user');
            if (saved) {
                user = JSON.parse(saved);
            }
            updateUI();
        }

        function saveData() {
            localStorage.setItem('petpet_user', JSON.stringify(user));
        }

        function updateUI() {
            document.getElementById('shopCoins').innerText = user.coins;
            document.getElementById('profileName').innerText = user.name;
            document.getElementById('profileStreak').innerText = user.streak;
            document.getElementById('profileMeetings').innerText = user.meetings;
            document.getElementById('profileCoins').innerText = user.coins;
        }

        // ============ FEED (TikTok Style) ============
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            if (!container) return;
            
            container.innerHTML = posts.map(post => `
                <div class="feed-item">
                    <div class="pet-card">
                        <div class="pet-emoji">🐉</div>
                        <div class="pet-level">Lv.${user.level}</div>
                    </div>
                    
                    <div class="action-bar">
                        <div class="action-btn" onclick="likePost('${post.id}')">
                            <div class="action-icon">❤️</div>
                            <div class="action-count" id="likes-${post.id}">${post.likes}</div>
                        </div>
                        <div class="action-btn" onclick="sharePost('${post.id}')">
                            <div class="action-icon">📤</div>
                        </div>
                    </div>
                    
                    <div class="post-content">
                        <div class="post-user">
                            <div class="post-avatar">${post.userAvatar}</div>
                            <div>
                                <div class="post-name">${post.userName} · ${post.petEmoji}</div>
                                <div class="post-time">${post.timeAgo}</div>
                            </div>
                        </div>
                        <div class="post-text">${post.content}</div>
                    </div>
                </div>
            `).join('');
        }

        function likePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.likes++;
                const likesSpan = document.getElementById(`likes-${postId}`);
                if (likesSpan) likesSpan.innerText = post.likes;
                
                // Animation feedback
                const btn = event.currentTarget;
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => btn.style.transform = '', 200);
            }
        }

        function sharePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (post && navigator.share) {
                navigator.share({ title: 'PETPET', text: post.content });
            } else if (post) {
                alert(post.content);
            }
        }

        // ============ WORLD ============
        function renderWorld() {
            const container = document.getElementById('worldList');
            if (!container) return;
            
            container.innerHTML = worldLocations.map(loc => `
                <div class="grid-item" onclick="visitLocation('${loc.name}')" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-weight: bold;">${loc.name}</div>
                        <div style="font-size: 11px; color: #888;">👥 ${loc.users} här</div>
                    </div>
                    <div>
                        ${loc.unlocked ? 
                            '<span style="color: #39FF14;">✅</span>' : 
                            `<span style="color: #ff9900;">🔒 Lv.${loc.requiredLevel}</span>`
                        }
                    </div>
                </div>
            `).join('');
        }

        function visitLocation(locationName) {
            const location = worldLocations.find(l => l.name === locationName);
            if (!location) return;
            
            if (!location.unlocked && location.requiredLevel > user.level) {
                alert(`🔒 Du måste vara level ${location.requiredLevel} för att besöka ${locationName}!`);
                return;
            }
            
            user.coins += 10;
            user.exp += 5;
            if (user.exp >= 100) {
                user.exp = 0;
                user.level++;
                alert(`🎉 LEVEL UP! Du är nu level ${user.level}!`);
            }
            saveData();
            updateUI();
            alert(`✨ Du besökte ${locationName}! +10 coins, +5 XP`);
        }

        // ============ SHOP ============
        function renderShop() {
            const container = document.getElementById('shopList');
            if (!container) return;
            
            container.innerHTML = shopItems.map(item => `
                <div class="shop-row">
                    <div>
                        <span style="font-size: 28px; margin-right: 12px;">${item.emoji}</span>
                        <span style="font-weight: bold;">${item.name}</span>
                    </div>
                    <button onclick="buyItem('${item.id}', ${item.price})" style="background: linear-gradient(135deg, #39FF14, #ff3333); border: none; padding: 8px 20px; border-radius: 25px; font-weight: bold; cursor: pointer;">
                        ${item.price}💰
                    </button>
                </div>
            `).join('');
        }

        function buyItem(itemId, price) {
            if (user.coins >= price) {
                user.coins -= price;
                saveData();
                updateUI();
                renderShop();
                alert(`✅ Du köpte ${shopItems.find(i => i.id === itemId).name}!`);
            } else {
                alert(`❌ Behöver ${price - user.coins} mer coins!`);
            }
        }

        // ============ PROFILE ============
        function shareProfile() {
            const text = `🔥 ${user.name} - Level ${user.level}!\n${user.streak} dagars streak!\n${user.meetings} IRL-möten!\n${user.coins} coins!\n\nLadda ner PETPET!`;
            if (navigator.share) {
                navigator.share({ title: 'PETPET', text: text });
            } else {
                alert(text);
            }
        }

        // ============ CAMERA ============
        function openCamera() {
            document.getElementById('cameraModal').classList.add('active');
        }

        function closeCamera() {
            document.getElementById('cameraModal').classList.remove('active');
            document.getElementById('postInput').value = '';
        }

        function createPost() {
            const content = document.getElementById('postInput').value;
            if (!content.trim()) {
                alert('Skriv något i ditt inlägg!');
                return;
            }
            
            const newPost = {
                id: Date.now().toString(),
                userName: user.name,
                userAvatar: '👤',
                petEmoji: '🐉',
                content: content,
                likes: 0,
                timeAgo: 'just nu'
            };
            
            posts.unshift(newPost);
            renderFeed();
            closeCamera();
            
            user.coins += 5;
            saveData();
            updateUI();
            alert('✅ Inlägg publicerat! +5 coins');
        }

        // ============ TAB NAVIGATION ============
        function switchTab(tab) {
            currentTab = tab;
            
            // Hide feed container and all screens
            document.getElementById('feedContainer').style.display = 'none';
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            
            if (tab === 'feed') {
                document.getElementById('feedContainer').style.display = 'block';
                renderFeed();
            } else if (tab === 'world') {
                document.getElementById('worldScreen').classList.add('active');
                renderWorld();
            } else if (tab === 'shop') {
                document.getElementById('shopScreen').classList.add('active');
                renderShop();
            } else if (tab === 'profile') {
                document.getElementById('profileScreen').classList.add('active');
            }
            
            // Update nav icons
            const icons = ['navWorldIcon', 'navFeedIcon', 'navShopIcon', 'navProfileIcon'];
            icons.forEach(icon => {
                const el = document.getElementById(icon);
                if (el) el.classList.remove('active');
            });
            const labels = ['navWorldLabel', 'navFeedLabel', 'navShopLabel', 'navProfileLabel'];
            labels.forEach(label => {
                const el = document.getElementById(label);
                if (el) el.classList.remove('active');
            });
            
            if (tab === 'world') {
                document.getElementById('navWorldIcon')?.classList.add('active');
                document.getElementById('navWorldLabel')?.classList.add('active');
            } else if (tab === 'feed') {
                document.getElementById('navFeedIcon')?.classList.add('active');
                document.getElementById('navFeedLabel')?.classList.add('active');
            } else if (tab === 'shop') {
                document.getElementById('navShopIcon')?.classList.add('active');
                document.getElementById('navShopLabel')?.classList.add('active');
            } else if (tab === 'profile') {
                document.getElementById('navProfileIcon')?.classList.add('active');
                document.getElementById('navProfileLabel')?.classList.add('active');
            }
        }

        // ============ INIT ============
        function init() {
            loadData();
            renderFeed();
            renderWorld();
            renderShop();
            switchTab('feed');
        }

        // Expose globals
        window.switchTab = switchTab;
        window.likePost = likePost;
        window.sharePost = sharePost;
        window.visitLocation = visitLocation;
        window.buyItem = buyItem;
        window.shareProfile = shareProfile;
        window.openCamera = openCamera;
        window.closeCamera = closeCamera;
        window.createPost = createPost;

        init();
    </script>
</body>
</html>
