<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PET SOCIAL 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* App Container */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* TikTok-style Feed */
        .feed-container {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            height: 100%;
            -webkit-overflow-scrolling: touch;
        }
        .feed-container::-webkit-scrollbar {
            display: none;
        }
        .feed-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 20px 100px;
        }

        /* Pet Display on Feed */
        .pet-display {
            position: absolute;
            top: 100px;
            right: 20px;
            text-align: center;
            z-index: 10;
        }
        .pet-emoji-large {
            font-size: 80px;
            filter: drop-shadow(0 0 20px rgba(57, 255, 20, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .pet-level {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #39FF14;
            margin-top: 8px;
            border: 1px solid rgba(57,255,20,0.3);
        }

        /* Post Content */
        .post-content {
            z-index: 5;
        }
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .post-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .post-time {
            font-size: 12px;
            color: #888;
        }
        .post-text {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 16px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        /* Action Buttons Sidebar (TikTok-style) */
        .action-sidebar {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 20;
        }
        .action-side-btn {
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action-side-btn:active {
            transform: scale(0.9);
        }
        .action-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        .action-count {
            font-size: 12px;
            color: #fff;
            margin-top: 4px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-emoji {
            font-size: 24px;
            opacity: 0.5;
            transition: all 0.2s;
        }
        .nav-emoji.active {
            opacity: 1;
            transform: scale(1.1);
        }
        .nav-camera {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            box-shadow: 0 0 20px rgba(57,255,20,0.5);
        }
        .nav-label {
            font-size: 10px;
            color: #888;
        }
        .nav-label.active {
            color: #39FF14;
        }

        /* Camera Modal */
        .camera-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }
        .camera-preview {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .camera-controls {
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }
        .hidden {
            display: none;
        }

        /* Profile Screen */
        .profile-screen {
            padding: 20px;
            overflow-y: auto;
            height: 100%;
        }
        .profile-header {
            text-align: center;
            padding: 40px 0;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 16px;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        .stat-box {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #39FF14;
        }
        .pet-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .exp-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #39FF14, #ff3333);
            width: 0%;
            border-radius: 4px;
        }

        /* Nearby Screen */
        .nearby-screen {
            padding: 20px;
            overflow-y: auto;
            height: 100%;
        }
        .friends-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        .friend-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            width: calc(50% - 6px);
            text-align: center;
            cursor: pointer;
        }
        .meet-btn {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            margin-top: 10px;
        }

        /* Challenge Card */
        .challenge-card {
            background: linear-gradient(135deg, rgba(57,255,20,0.1), rgba(255,51,51,0.1));
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(57,255,20,0.3);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Feed Container (TikTok Style) -->
        <div id="feedContainer" class="feed-container"></div>

        <!-- Camera Modal -->
        <div id="cameraModal" class="camera-modal hidden">
            <div class="camera-preview" id="cameraPreview">
                <div style="text-align:center">
                    <div style="font-size:60px; margin-bottom:20px">📸</div>
                    <button onclick="openCameraInput()" style="background:#39FF14; padding:12px 24px; border-radius:30px; border:none; font-weight:bold">Välj bild</button>
                </div>
            </div>
            <div class="camera-controls">
                <button onclick="closeCamera()" style="background:#333; padding:12px 24px; border-radius:30px; border:none; color:#fff">Stäng</button>
                <button id="postBtn" onclick="submitPost()" style="background:#39FF14; padding:12px 24px; border-radius:30px; border:none; font-weight:bold; display:none">📤 Posta</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="switchTab('feed')">
                <span class="nav-emoji" id="navFeedEmoji">🔥</span>
                <span class="nav-label" id="navFeedLabel">Feed</span>
            </button>
            <button class="nav-item" onclick="openCamera()">
                <div class="nav-camera"><span>📸</span></div>
                <span class="nav-label">Posta</span>
            </button>
            <button class="nav-item" onclick="switchTab('nearby')">
                <span class="nav-emoji" id="navNearbyEmoji">📍</span>
                <span class="nav-label" id="navNearbyLabel">Nära</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile')">
                <span class="nav-emoji" id="navProfileEmoji">👤</span>
                <span class="nav-label" id="navProfileLabel">Min</span>
            </button>
        </div>
    </div>

    <script>
        // ============ USER DATA ============
        let user = {
            name: '',
            pet: { name: 'Eldragon', emoji: '🐉', level: 1, exp: 0, abilities: ['Fire Breath', 'Fly'] },
            streak: 0,
            meetings: 0,
            badges: []
        };

        let posts = [
            { id: '1', userName: 'Ella', userAvatar: '👩‍🎤', petEmoji: '🐉', content: 'Träffade Max idag! 🔥', likes: 47, timeAgo: '10 min' },
            { id: '2', userName: 'Max', userAvatar: '🧑‍🚀', petEmoji: '🐺', content: 'Level up! 💀', likes: 32, timeAgo: '1 tim' },
            { id: '3', userName: 'Clara', userAvatar: '👩‍💻', petEmoji: '🦊', content: 'Legendary skin! ✨', likes: 89, timeAgo: '3 tim' }
        ];

        let friends = [
            { name: 'Ella', avatar: '👩‍🎤', petEmoji: '🐉', distance: '500m' },
            { name: 'Max', avatar: '🧑‍🚀', petEmoji: '🐺', distance: '1.2km' },
            { name: 'Clara', avatar: '👩‍💻', petEmoji: '🦊', distance: '800m' },
            { name: 'Leo', avatar: '🧑‍🎤', petEmoji: '🐱', distance: '2.1km' }
        ];

        let dailyChallenge = { text: 'Träffa 2 kompisar', progress: 0, required: 2, reward: '🔥 Fire Wings' };
        let currentTab = 'feed';
        let selectedImage = null;

        // ============ INIT ============
        function init() {
            const saved = localStorage.getItem('pet_user');
            if (saved) {
                user = JSON.parse(saved);
            } else {
                let name = prompt('🔥 Välkommen! Vad heter du?', 'Din vän');
                if (name) user.name = name;
                saveUser();
            }
            renderFeed();
            if (currentTab === 'feed') document.getElementById('feedContainer').style.display = 'block';
            updateNavActive('feed');
        }

        function saveUser() {
            localStorage.setItem('pet_user', JSON.stringify(user));
        }

        // ============ RENDER FEED (TikTok Style) ============
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            if (!container) return;
            
            container.innerHTML = posts.map(post => `
                <div class="feed-item">
                    <div class="pet-display">
                        <div class="pet-emoji-large">${user.pet.emoji}</div>
                        <div class="pet-level">Lv.${user.pet.level}</div>
                    </div>
                    
                    <div class="action-sidebar">
                        <div class="action-side-btn" onclick="likePost('${post.id}')">
                            <div class="action-icon">❤️</div>
                            <div class="action-count">${post.likes}</div>
                        </div>
                        <div class="action-side-btn">
                            <div class="action-icon">💬</div>
                            <div class="action-count">12</div>
                        </div>
                        <div class="action-side-btn" onclick="sharePost()">
                            <div class="action-icon">📤</div>
                        </div>
                    </div>
                    
                    <div class="post-content">
                        <div class="post-user">
                            <div class="post-avatar">${post.userAvatar}</div>
                            <div>
                                <div class="post-name">${post.userName} · ${post.petEmoji}</div>
                                <div class="post-time">${post.timeAgo}</div>
                            </div>
                        </div>
                        <div class="post-text">${post.content}</div>
                    </div>
                </div>
            `).join('');
        }

        function likePost(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                post.likes++;
                renderFeed();
                // Animation effect
                const btn = event.currentTarget;
                btn.style.transform = 'scale(1.3)';
                setTimeout(() => btn.style.transform = '', 200);
            }
        }

        function sharePost() {
            alert('📤 Dela denna post på Snap/TikTok!');
        }

        // ============ CAMERA ============
        function openCamera() {
            document.getElementById('cameraModal').classList.remove('hidden');
        }

        function closeCamera() {
            document.getElementById('cameraModal').classList.add('hidden');
            selectedImage = null;
            document.getElementById('postBtn').style.display = 'none';
        }

        function openCameraInput() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = (event) => {
                    selectedImage = event.target.result;
                    document.getElementById('cameraPreview').innerHTML = `<img src="${selectedImage}" style="width:100%; height:100%; object-fit:cover">`;
                    document.getElementById('postBtn').style.display = 'block';
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function submitPost() {
            if (selectedImage) {
                const newPost = {
                    id: Date.now().toString(),
                    userName: user.name,
                    userAvatar: '👤',
                    petEmoji: user.pet.emoji,
                    content: 'Kolla in mitt äventyr! 🔥',
                    likes: 0,
                    timeAgo: 'just nu'
                };
                posts.unshift(newPost);
                selectedImage = null;
                closeCamera();
                renderFeed();
                switchTab('feed');
            }
        }

        // ============ MEET FRIENDS (IRL) ============
        function meetFriend(name) {
            user.meetings++;
            user.streak++;
            user.pet.exp += 10;
            
            if (user.pet.exp >= 100) {
                user.pet.exp = 0;
                user.pet.level++;
                alert(`🎉 LEVEL UP! Din ${user.pet.name} är nu level ${user.pet.level}!`);
            }
            
            dailyChallenge.progress = Math.min(dailyChallenge.progress + 1, dailyChallenge.required);
            
            if (dailyChallenge.progress >= dailyChallenge.required) {
                alert(`🔥 UTMANING KLAR! Du fick: ${dailyChallenge.reward}`);
                dailyChallenge.progress = 0;
            }
            
            saveUser();
            renderNearby();
            renderProfile();
            alert(`✅ Du mötte ${name}! +10 XP till din pet`);
        }

        // ============ RENDER NEARBY ============
        function renderNearby() {
            const container = document.getElementById('nearbyContainer');
            if (!container) return;
            
            const challengePercent = (dailyChallenge.progress / dailyChallenge.required) * 100;
            
            container.innerHTML = `
                <div class="challenge-card">
                    <div>⚡️ DAGENS UTMANING</div>
                    <div style="font-weight:bold; margin:8px 0">${dailyChallenge.text}</div>
                    <div class="exp-bar"><div class="exp-fill" style="width:${challengePercent}%"></div></div>
                    <div style="font-size:12px; color:#39FF14">Belöning: ${dailyChallenge.reward}</div>
                </div>
                <div class="friends-grid">
                    ${friends.map(f => `
                        <div class="friend-card" onclick="meetFriend('${f.name}')">
                            <div style="font-size:50px">${f.avatar}</div>
                            <div style="font-weight:bold; margin:8px 0">${f.name}</div>
                            <div>${f.petEmoji} ${f.distance}</div>
                            <button class="meet-btn">MÖT</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ============ RENDER PROFILE ============
        function renderProfile() {
            const container = document.getElementById('profileContainer');
            if (!container) return;
            
            const expPercent = (user.pet.exp / 100) * 100;
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <div style="font-size:24px; font-weight:bold; margin:8px 0">${user.name}</div>
                    <div class="profile-stats">
                        <div class="stat-box"><div class="stat-value">${user.streak}</div><div>Streak</div></div>
                        <div class="stat-box"><div class="stat-value">${user.meetings}</div><div>Möten</div></div>
                        <div class="stat-box"><div class="stat-value">${user.pet.level}</div><div>Level</div></div>
                    </div>
                </div>
                
                <div class="pet-card">
                    <div style="font-size:80px">${user.pet.emoji}</div>
                    <div style="font-size:20px; font-weight:bold">${user.pet.name}</div>
                    <div class="exp-bar"><div class="exp-fill" style="width:${expPercent}%"></div></div>
                    <div>${user.pet.exp}/100 XP till level ${user.pet.level + 1}</div>
                    <div style="margin-top:15px">
                        ${user.pet.abilities.map(a => `<span style="background:rgba(57,255,20,0.2); padding:4px 12px; border-radius:20px; margin:4px; display:inline-block">${a}</span>`).join('')}
                    </div>
                </div>
                
                <button onclick="shareProfile()" style="width:100%; background:rgba(255,255,255,0.1); padding:16px; border-radius:30px; border:none; color:#fff; margin-top:20px">
                    📤 DELA PROFIL
                </button>
            `;
        }

        // ============ SWITCH TABS ============
        function switchTab(tab) {
            currentTab = tab;
            
            // Hide all screens
            document.getElementById('feedContainer').style.display = 'none';
            const nearbyScreen = document.getElementById('nearbyScreen');
            const profileScreen = document.getElementById('profileScreen');
            
            if (!nearbyScreen) {
                const newNearby = document.createElement('div');
                newNearby.id = 'nearbyScreen';
                newNearby.className = 'nearby-screen';
                document.querySelector('.app-container').insertBefore(newNearby, document.querySelector('.bottom-nav'));
                newNearby.innerHTML = '<div id="nearbyContainer"></div>';
            }
            if (!profileScreen) {
                const newProfile = document.createElement('div');
                newProfile.id = 'profileScreen';
                newProfile.className = 'profile-screen';
                document.querySelector('.app-container').insertBefore(newProfile, document.querySelector('.bottom-nav'));
                newProfile.innerHTML = '<div id="profileContainer"></div>';
            }
            
            const nearbyEl = document.getElementById('nearbyScreen');
            const profileEl = document.getElementById('profileScreen');
            
            if (nearbyEl) nearbyEl.style.display = 'none';
            if (profileEl) profileEl.style.display = 'none';
            
            if (tab === 'feed') {
                document.getElementById('feedContainer').style.display = 'block';
                renderFeed();
            }
            if (tab === 'nearby') {
                if (nearbyEl) nearbyEl.style.display = 'block';
                renderNearby();
            }
            if (tab === 'profile') {
                if (profileEl) profileEl.style.display = 'block';
                renderProfile();
            }
            
            updateNavActive(tab);
        }

        function updateNavActive(tab) {
            const emojis = { feed: 'navFeedEmoji', nearby: 'navNearbyEmoji', profile: 'navProfileEmoji' };
            const labels = { feed: 'navFeedLabel', nearby: 'navNearbyLabel', profile: 'navProfileLabel' };
            
            Object.keys(emojis).forEach(t => {
                const emoji = document.getElementById(emojis[t]);
                const label = document.getElementById(labels[t]);
                if (emoji) emoji.classList.remove('active');
                if (label) label.classList.remove('active');
            });
            
            if (emojis[tab]) {
                const activeEmoji = document.getElementById(emojis[tab]);
                const activeLabel = document.getElementById(labels[tab]);
                if (activeEmoji) activeEmoji.classList.add('active');
                if (activeLabel) activeLabel.classList.add('active');
            }
        }

        function shareProfile() {
            const shareText = `🔥 ${user.name} - Level ${user.pet.level} ${user.pet.name}!\n${user.streak} dagars streak!\n${user.meetings} IRL-möten!\n\nLadda ner PET SOCIAL!`;
            if (navigator.share) {
                navigator.share({ title: 'PET SOCIAL', text: shareText });
            } else {
                alert(shareText);
            }
        }

        // Create missing screens
        function createScreens() {
            if (!document.getElementById('nearbyScreen')) {
                const div = document.createElement('div');
                div.id = 'nearbyScreen';
                div.className = 'nearby-screen';
                div.style.display = 'none';
                div.innerHTML = '<div id="nearbyContainer"></div>';
                document.querySelector('.app-container').insertBefore(div, document.querySelector('.bottom-nav'));
            }
            if (!document.getElementById('profileScreen')) {
                const div = document.createElement('div');
                div.id = 'profileScreen';
                div.className = 'profile-screen';
                div.style.display = 'none';
                div.innerHTML = '<div id="profileContainer"></div>';
                document.querySelector('.app-container').insertBefore(div, document.querySelector('.bottom-nav'));
            }
        }

        // Start
        createScreens();
        init();
        switchTab('feed');
    </script>
</body>
</html>
