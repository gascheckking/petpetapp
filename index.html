<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PETVERSE 🔥 | En digital värld</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://emojicdn.elk.sh/🌍">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a2a">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0a0a2a 0%, #000000 100%);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* ============ 3D BACKGROUND EFFECT ============ */
        .universe-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1); }
        }
        .nebula {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(57,255,20,0.15), transparent 70%);
            filter: blur(40px);
            animation: drift 20s ease-in-out infinite;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(50px, -30px); }
            50% { transform: translate(-30px, 50px); }
            75% { transform: translate(30px, 30px); }
        }

        /* ============ MAIN APP CONTAINER ============ */
        .app {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
        }

        /* ============ TOP BAR (Status + Avatar) ============ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(10,10,20,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(57,255,20,0.2);
            z-index: 50;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar-small {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 15px rgba(57,255,20,0.4);
        }
        .user-stats {
            display: flex;
            gap: 15px;
        }
        .stat-badge {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid rgba(57,255,20,0.3);
        }
        .stat-badge span:first-child { font-size: 14px; }
        .stat-badge span:last-child { color: #39FF14; }

        /* ============ WORLD MAP (HORIZONTAL SCROLL) ============ */
        .world-map {
            padding: 15px 20px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            z-index: 20;
        }
        .world-map::-webkit-scrollbar { display: none; }
        .map-locations {
            display: inline-flex;
            gap: 12px;
        }
        .location-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: rgba(20,20,40,0.7);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(57,255,20,0.3);
            transition: all 0.2s;
            cursor: pointer;
        }
        .location-card.active {
            background: linear-gradient(135deg, rgba(57,255,20,0.2), rgba(255,51,51,0.1));
            border-color: #39FF14;
            box-shadow: 0 0 20px rgba(57,255,20,0.3);
        }
        .location-emoji { font-size: 28px; margin-bottom: 4px; }
        .location-name { font-size: 12px; font-weight: bold; color: #fff; }
        .location-status { font-size: 10px; color: #39FF14; }

        /* ============ MAIN FEED (TIKTOK-STYLE) ============ */
        .feed-container {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 0;
            margin: 0;
        }
        .feed-container::-webkit-scrollbar { display: none; }
        .post {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 20px 100px;
        }

        /* ============ 3D PET CARD ============ */
        .pet-3d-card {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 12px 18px;
            text-align: center;
            border: 1px solid rgba(57,255,20,0.4);
            box-shadow: 0 0 30px rgba(57,255,20,0.2);
            animation: floatCard 3s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes floatCard {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .pet-3d-emoji { font-size: 70px; filter: drop-shadow(0 0 15px #39FF14); }
        .pet-3d-level { font-size: 11px; color: #39FF14; margin-top: 5px; }
        .pet-3d-name { font-size: 12px; color: rgba(255,255,255,0.8); }

        /* ============ POST CONTENT ============ */
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .post-name { font-size: 16px; font-weight: bold; color: #fff; }
        .post-time { font-size: 11px; color: rgba(255,255,255,0.5); }
        .post-text { font-size: 18px; font-weight: 500; color: #fff; margin-bottom: 16px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* ============ ACTION SIDEBAR ============ */
        .action-sidebar {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 20;
        }
        .action-btn {
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:active { transform: scale(0.85); }
        .action-icon { font-size: 32px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .action-count { font-size: 11px; color: #fff; margin-top: 4px; }

        /* ============ BOTTOM NAV (ROBLOX STYLE) ============ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: rgba(10,10,20,0.9);
            backdrop-filter: blur(25px);
            padding: 10px 20px 25px;
            border-top: 1px solid rgba(57,255,20,0.2);
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-icon { font-size: 26px; opacity: 0.5; transition: all 0.2s; }
        .nav-icon.active { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 8px #39FF14); }
        .nav-camera {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -22px;
            box-shadow: 0 0 25px rgba(57,255,20,0.5);
        }
        .nav-label { font-size: 10px; color: #888; }
        .nav-label.active { color: #39FF14; }

        /* ============ MODALS ============ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(30px);
            z-index: 200;
            display: flex;
            flex-direction: column;
            animation: fadeInModal 0.3s ease-out;
        }
        @keyframes fadeInModal {
            from { opacity: 0; backdrop-filter: blur(0); }
            to { opacity: 1; backdrop-filter: blur(30px); }
        }
        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .hidden { display: none; }

        /* ============ CARDS ============ */
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 14px 28px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); }
        
        /* World specific */
        .world-screen, .shop-screen, .bounties-screen, .profile-screen {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }
        .grid-2 {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .grid-item {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            width: calc(50% - 6px);
            text-align: center;
            cursor: pointer;
        }
        .exp-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #39FF14, #ff3333);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <!-- 3D Background -->
    <div class="universe-bg" id="universeBg"></div>

    <div class="app">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="user-info">
                <div class="user-avatar-small" id="topAvatar">🐉</div>
                <div class="user-stats">
                    <div class="stat-badge"><span>🔥</span><span id="topStreak">0</span></div>
                    <div class="stat-badge"><span>💰</span><span id="topCoins">500</span></div>
                </div>
            </div>
            <div class="stat-badge" id="topLevel">Lv.1</div>
        </div>

        <!-- World Map (Horizontal Scroll) -->
        <div class="world-map">
            <div class="map-locations" id="worldMap">
                <div class="location-card active" data-location="feed">
                    <div class="location-emoji">🏠</div>
                    <div class="location-name">Hemvärlden</div>
                    <div class="location-status">🔥 127 här</div>
                </div>
                <div class="location-card" data-location="shop">
                    <div class="location-emoji">🛍️</div>
                    <div class="location-name">Shopping Plaza</div>
                    <div class="location-status">✨ 5 deals</div>
                </div>
                <div class="location-card" data-location="bounties">
                    <div class="location-emoji">🎯</div>
                    <div class="location-name">Uppdragstorget</div>
                    <div class="location-status">⚡ 3 aktiva</div>
                </div>
                <div class="location-card" data-location="world">
                    <div class="location-emoji">🌍</div>
                    <div class="location-name">Världskartan</div>
                    <div class="location-status">👥 89 här</div>
                </div>
                <div class="location-card" data-location="profile">
                    <div class="location-emoji">👤</div>
                    <div class="location-name">Mitt Torn</div>
                    <div class="location-status">⭐ Lv.${Math.floor(Math.random()*10)+1}</div>
                </div>
            </div>
        </div>

        <!-- Feed Container -->
        <div id="feedContainer" class="feed-container"></div>

        <!-- Modals -->
        <div id="shopModal" class="modal hidden">
            <div class="modal-header"><button class="btn-secondary" onclick="closeShop()" style="background:none; color:#fff; border:none">← Tillbaka</button><span style="font-weight:bold">🛍️ Shopping Plaza</span><div style="width:50px"></div></div>
            <div class="modal-content" id="shopContent"></div>
        </div>
        <div id="bountiesModal" class="modal hidden">
            <div class="modal-header"><button class="btn-secondary" onclick="closeBounties()" style="background:none; color:#fff; border:none">← Tillbaka</button><span style="font-weight:bold">🎯 Uppdragstorget</span><div style="width:50px"></div></div>
            <div class="modal-content" id="bountiesContent"></div>
        </div>
        <div id="worldModal" class="modal hidden">
            <div class="modal-header"><button class="btn-secondary" onclick="closeWorld()" style="background:none; color:#fff; border:none">← Tillbaka</button><span style="font-weight:bold">🌍 Världskartan</span><div style="width:50px"></div></div>
            <div class="modal-content" id="worldContent"></div>
        </div>
        <div id="profileModal" class="modal hidden">
            <div class="modal-header"><button class="btn-secondary" onclick="closeProfile()" style="background:none; color:#fff; border:none">← Tillbaka</button><span style="font-weight:bold">👤 Mitt Torn</span><div style="width:50px"></div></div>
            <div class="modal-content" id="profileContent"></div>
        </div>
        <div id="cameraModal" class="modal hidden">
            <div class="modal-header"><button class="btn-secondary" onclick="closeCamera()" style="background:none; color:#fff; border:none">← Tillbaka</button><span style="font-weight:bold">📸 Skapa inlägg</span><div style="width:50px"></div></div>
            <div class="modal-content" id="cameraContent" style="display:flex; flex-direction:column; align-items:center; justify-content:center"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="switchWorldLocation('feed')"><span class="nav-icon" id="navFeedIcon">🔥</span><span class="nav-label">Hem</span></button>
            <button class="nav-item" onclick="switchWorldLocation('shop')"><span class="nav-icon" id="navShopIcon">🛍️</span><span class="nav-label">Shop</span></button>
            <button class="nav-item" onclick="openCamera()"><div class="nav-camera"><span>📸</span></div><span class="nav-label">Nytt</span></button>
            <button class="nav-item" onclick="switchWorldLocation('bounties')"><span class="nav-icon" id="navBountiesIcon">🎯</span><span class="nav-label">Uppdrag</span></button>
            <button class="nav-item" onclick="switchWorldLocation('profile')"><span class="nav-icon" id="navProfileIcon">👤</span><span class="nav-label">Min</span></button>
        </div>
    </div>

    <script>
        // ============ CREATE 3D STARS BACKGROUND ============
        function createStars() {
            const bg = document.getElementById('universeBg');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = Math.random() * 3 + 2 + 's';
                bg.appendChild(star);
            }
            for (let i = 0; i < 5; i++) {
                const nebula = document.createElement('div');
                nebula.className = 'nebula';
                nebula.style.left = Math.random() * 80 + '%';
                nebula.style.top = Math.random() * 80 + '%';
                nebula.style.animationDelay = Math.random() * 5 + 's';
                bg.appendChild(nebula);
            }
        }
        createStars();

        // ============ PET DATA ============
        const PET_TYPES = {
            dragon: { name: 'Eldraken', emoji: '🐉', abilities: ['🔥 Fire Breath', '🪽 Fly'] },
            wolf: { name: 'Skuggvarg', emoji: '🐺', abilities: ['🌙 Howl', '🏃 Hunt'] },
            phoenix: { name: 'Fenix', emoji: '🔥', abilities: ['✨ Rebirth', '🕊️ Fly'] }
        };

        // ============ USER DATA ============
        let user = {
            id: 'user1', name: '', petType: 'dragon', petLevel: 1, petExp: 0,
            coins: 500, streak: 0, meetings: 0, badges: [], collectedCodes: []
        };

        // ============ SHOP DATA ============
        let shopItems = [
            { id: 'skin1', name: '🔥 Fire Wings', price: 200, emoji: '🔥' },
            { id: 'skin2', name: '✨ Legendary Glow', price: 500, emoji: '✨' },
            { id: 'item1', name: '⚡ XP Boost', price: 100, emoji: '⚡' }
        ];
        let discountCodes = [{ code: 'MYPET20', discount: 20, partner: 'Svenska Spel' }];
        let irlShops = [
            { name: '🐉 Drake Spelbutik', address: 'Tumba', distance: '500m', discount: '15%' }
        ];

        // ============ BOUNTIES ============
        let bounties = [
            { id: 'b1', title: '📸 Fota något blått', description: 'Hitta något blått, fota och ladda upp!', reward: 100, creator: 'Ella', expires: '2026-06-01', claims: [], status: 'active' },
            { id: 'b2', title: '🏃 Gå 5000 steg', description: 'Visa screenshot från stegräknaren.', reward: 150, creator: 'Max', expires: '2026-06-15', claims: [], status: 'active' }
        ];

        // ============ SOCIAL DATA ============
        let posts = [
            { id: 'p1', userName: 'Ella', userAvatar: '👩‍🎤', petEmoji: '🐉', content: 'Köpte Fire Wings till min drake! 🔥', likes: 47, timeAgo: '15 min' },
            { id: 'p2', userName: 'Max', userAvatar: '🧑‍🚀', petEmoji: '🐺', content: 'Level 10! 🎉', likes: 32, timeAgo: '1 tim' }
        ];
        let friends = [
            { name: 'Ella', avatar: '👩‍🎤', petEmoji: '🐉', petLevel: 12, distance: '300m' },
            { name: 'Max', avatar: '🧑‍🚀', petEmoji: '🐺', petLevel: 8, distance: '800m' }
        ];
        let leaderboard = [
            { name: 'Ella', petLevel: 12, streak: 47 },
            { name: 'Max', petLevel: 8, streak: 32 },
            { name: 'Du', petLevel: 1, streak: 0 }
        ];

        // ============ WORLD LOCATIONS ============
        let currentLocation = 'feed';
        let selectedImage = null;

        // ============ INIT ============
        function init() {
            const saved = localStorage.getItem('petverse_user');
            if (saved) { user = JSON.parse(saved); }
            else {
                let name = prompt('🌍 Välkommen till PETVERSE!\n\nVad heter din avatar?', 'Äventyrare');
                if (name) { user.name = name; saveUser(); }
            }
            updateUI();
            renderFeed();
            switchWorldLocation('feed');
        }
        function saveUser() { localStorage.setItem('petverse_user', JSON.stringify(user)); updateUI(); }
        function updateUI() {
            document.getElementById('topAvatar').innerHTML = PET_TYPES[user.petType].emoji;
            document.getElementById('topStreak').innerHTML = user.streak;
            document.getElementById('topCoins').innerHTML = user.coins;
            document.getElementById('topLevel').innerHTML = `Lv.${user.petLevel}`;
        }

        // ============ FEED ============
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            if (!container) return;
            const pet = PET_TYPES[user.petType];
            container.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="pet-3d-card">
                        <div class="pet-3d-emoji">${pet.emoji}</div>
                        <div class="pet-3d-level">Lv.${user.petLevel}</div>
                        <div class="pet-3d-name">${pet.name}</div>
                    </div>
                    <div class="action-sidebar">
                        <div class="action-btn" onclick="likePost('${post.id}')"><div class="action-icon">❤️</div><div class="action-count">${post.likes}</div></div>
                        <div class="action-btn" onclick="sharePost('${post.id}')"><div class="action-icon">📤</div></div>
                    </div>
                    <div class="post-content">
                        <div class="post-user"><div class="post-avatar">${post.userAvatar}</div><div><div class="post-name">${post.userName} · ${post.petEmoji}</div><div class="post-time">${post.timeAgo}</div></div></div>
                        <div class="post-text">${post.content}</div>
                    </div>
                </div>
            `).join('');
        }
        function likePost(id) { let p = posts.find(p => p.id === id); if (p) { p.likes++; renderFeed(); } }
        function sharePost(id) { let p = posts.find(p => p.id === id); if (p && navigator.share) navigator.share({ title: 'PETVERSE', text: p.content }); }

        // ============ SHOP ============
        function renderShop() {
            const container = document.getElementById('shopContent');
            container.innerHTML = `
                <div class="glass-card"><div style="display:flex; justify-content:space-between"><span style="font-size:28px; font-weight:bold">💰 ${user.coins}</span><span style="background:#39FF14; padding:4px 12px; border-radius:20px">Lv.${user.petLevel}</span></div></div>
                <div class="glass-card"><div style="font-weight:bold">🎟️ RABATTKODER</div>${discountCodes.map(c => `<div class="glass-card" style="margin-top:8px"><div>${c.code}</div><button class="btn-primary" style="padding:8px 16px; font-size:12px" onclick="claimCode('${c.code}')">Använd</button></div>`).join('')}</div>
                <div><div style="font-weight:bold">🛍️ SHOP</div>${shopItems.map(i => `<div class="glass-card" style="display:flex; justify-content:space-between; align-items:center"><div><span style="font-size:32px">${i.emoji}</span> ${i.name}</div><button class="btn-primary" style="padding:8px 16px; font-size:12px" onclick="buyItem('${i.id}', ${i.price})">${i.price}💰</button></div>`).join('')}</div>
                <div><div style="font-weight:bold">🏪 IRL SHOPS</div>${irlShops.map(s => `<div class="glass-card"><div>${s.name}</div><div>${s.address} · ${s.distance}</div><button class="btn-primary" style="margin-top:8px" onclick="visitShop('${s.name}')">🎮 Spela in +50💰</button></div>`).join('')}</div>
            `;
        }
        function buyItem(id, price) { if (user.coins >= price) { user.coins -= price; saveUser(); alert(`✅ Köpte ${shopItems.find(i => i.id === id).name}!`); renderShop(); } else alert(`❌ Behöver ${price - user.coins} mer`); }
        function claimCode(code) { if (user.collectedCodes.includes(code)) { alert('❌ Redan använd'); return; } user.coins += 100; user.collectedCodes.push(code); saveUser(); alert(`✅ +100 coins!`); renderShop(); }
        function visitShop(name) { user.coins += 50; user.meetings++; user.petExp += 15; if (user.petExp >= 100) { user.petExp = 0; user.petLevel++; alert(`🎉 LEVEL UP! Level ${user.petLevel}!`); } saveUser(); updateUI(); alert(`🎮 +50 coins, +15 XP!`); renderShop(); }
        function openShop() { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); }
        function closeShop() { document.getElementById('shopModal').classList.add('hidden'); }

        // ============ BOUNTIES ============
        function renderBounties() {
            const container = document.getElementById('bountiesContent');
            let myClaims = [];
            bounties.forEach(b => b.claims.forEach(c => { if (c.userId === user.id) myClaims.push(c); }));
            container.innerHTML = `
                <div class="glass-card"><div style="display:flex; justify-content:space-between"><span>🎯 AKTIVA UPPDRAG</span><span>💰 ${user.coins}</span></div></div>
                ${bounties.filter(b => b.status === 'active').map(b => `<div class="glass-card"><div style="font-weight:bold">${b.title}</div><div>${b.description}</div><div style="color:#39FF14">+${b.reward} coins</div><button class="btn-primary" style="margin-top:8px" onclick="claimBounty('${b.id}')">🎯 Gör uppdrag</button></div>`).join('')}
                <div><div style="font-weight:bold">📋 MINA UPPDRAG</div>${myClaims.length === 0 ? '<div class="glass-card">Inga uppdrag än</div>' : myClaims.map(c => `<div class="glass-card"><div>${c.description || 'Uppdrag'}</div><span style="color:#ff9900">⏳ Väntar på godkännande</span></div>`).join('')}</div>
                <button class="btn-primary" onclick="createBounty()">➕ SKAPA UPPDRAG</button>
            `;
        }
        function claimBounty(bountyId) {
            let bounty = bounties.find(b => b.id === bountyId);
            if (!bounty) return;
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = (ev) => {
                    let desc = prompt('Beskriv ditt bevis:', 'Jag gjorde uppdraget!');
                    bounty.claims.push({ id: Date.now().toString(), bountyId, userId: user.id, userName: user.name, proofImage: ev.target.result, description: desc || '', status: 'pending' });
                    localStorage.setItem('petverse_bounties', JSON.stringify(bounties));
                    alert(`✅ Uppdrag inskickat!`);
                    renderBounties();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        function createBounty() {
            let title = prompt('Vad heter uppdraget?', '📸 Fota något');
            if (!title) return;
            let desc = prompt('Beskriv vad man ska göra:', 'Fota och ladda upp');
            if (!desc) return;
            let reward = parseInt(prompt('Belöning i coins:', '100'));
            bounties.push({ id: 'b' + Date.now(), title, description: desc, reward, creator: user.name, expires: '2026-07-01', claims: [], status: 'active' });
            localStorage.setItem('petverse_bounties', JSON.stringify(bounties));
            alert(`✅ Uppdrag "${title}" skapat!`);
            renderBounties();
        }
        function openBounties() { renderBounties(); document.getElementById('bountiesModal').classList.remove('hidden'); }
        function closeBounties() { document.getElementById('bountiesModal').classList.add('hidden'); }

        // ============ WORLD MAP ============
        function renderWorld() {
            const container = document.getElementById('worldContent');
            container.innerHTML = `
                <div class="glass-card"><div style="font-size:20px; font-weight:bold">🌍 UTFORSKA VÄRLDEN</div><div>Besök olika platser, träffa vänner och samla coins!</div></div>
                <div class="grid-2">
                    <div class="grid-item" onclick="switchWorldLocation('feed')"><div style="font-size:40px">🏠</div><div>Hemvärlden</div><div style="font-size:11px; color:#888">127 här just nu</div></div>
                    <div class="grid-item" onclick="switchWorldLocation('shop')"><div style="font-size:40px">🛍️</div><div>Shopping Plaza</div><div style="font-size:11px; color:#888">5 deals aktiva</div></div>
                    <div class="grid-item" onclick="switchWorldLocation('bounties')"><div style="font-size:40px">🎯</div><div>Uppdragstorget</div><div style="font-size:11px; color:#888">3 uppdrag</div></div>
                    <div class="grid-item" onclick="switchWorldLocation('profile')"><div style="font-size:40px">👤</div><div>Mitt Torn</div><div style="font-size:11px; color:#888">Din profil</div></div>
                </div>
                <div class="glass-card"><div style="font-weight:bold">👥 VÄNNER ONLINE</div>${friends.map(f => `<div style="display:flex; justify-content:space-between; padding:8px 0"><span>${f.avatar} ${f.name}</span><span style="color:#39FF14">${f.distance}</span></div>`).join('')}</div>
            `;
        }
        function openWorld() { renderWorld(); document.getElementById('worldModal').classList.remove('hidden'); }
        function closeWorld() { document.getElementById('worldModal').classList.add('hidden'); }

        // ============ PROFILE ============
        function renderProfile() {
            const container = document.getElementById('profileContent');
            const pet = PET_TYPES[user.petType];
            const expPercent = (user.petExp / 100) * 100;
            container.innerHTML = `
                <div style="text-align:center"><div class="user-avatar-small" style="width:100px; height:100px; border-radius:50px; font-size:55px; margin:0 auto">${pet.emoji}</div><div style="font-size:24px; font-weight:bold; margin-top:10px">${user.name}</div><div>${pet.name} · Level ${user.petLevel}</div></div>
                <div class="stats-row" style="display:flex; justify-content:center; gap:30px; margin:20px 0"><div style="text-align:center"><div class="stat-value" style="font-size:28px; color:#39FF14">${user.streak}</div><div>Streak</div></div><div><div class="stat-value" style="font-size:28px; color:#39FF14">${user.meetings}</div><div>Möten</div></div><div><div class="stat-value" style="font-size:28px; color:#39FF14">${user.coins}</div><div>Coins</div></div></div>
                <div class="glass-card"><div class="exp-bar"><div class="exp-fill" style="width:${expPercent}%"></div></div><div>${user.petExp}/100 XP till level ${user.petLevel + 1}</div><div class="abilities" style="display:flex; gap:8px; margin-top:12px">${pet.abilities.map(a => `<span style="background:rgba(57,255,20,0.2); padding:4px 12px; border-radius:20px">${a}</span>`).join('')}</div></div>
                <div><div style="font-weight:bold">🏆 TOPPLISTA</div>${leaderboard.map((item, idx) => `<div style="display:flex; justify-content:space-between; padding:8px 0"><span>${idx === 0 ? '👑' : idx === 1 ? '⭐' : '🔥'} ${item.name}</span><span style="color:#39FF14">Lv.${item.petLevel}</span><span>${item.streak}d</span></div>`).join('')}</div>
                <button class="btn-primary" style="margin-top:20px" onclick="shareProfile()">📤 DELA PROFIL</button>
            `;
        }
        function shareProfile() { const shareText = `🔥 ${user.name} - Level ${user.petLevel} pet! ${user.streak} dagars streak!`; if (navigator.share) navigator.share({ title: 'PETVERSE', text: shareText }); else alert(shareText); }
        function openProfile() { renderProfile(); document.getElementById('profileModal').classList.remove('hidden'); }
        function closeProfile() { document.getElementById('profileModal').classList.add('hidden'); }

        // ============ CAMERA ============
        function openCamera() { document.getElementById('cameraModal').classList.remove('hidden'); document.getElementById('cameraContent').innerHTML = `<div style="text-align:center"><div style="font-size:70px; margin-bottom:20px">🐾</div><button class="btn-primary" onclick="selectImage()">📷 Välj bild</button></div>`; }
        function closeCamera() { document.getElementById('cameraModal').classList.add('hidden'); selectedImage = null; }
        function selectImage() { let input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => { selectedImage = ev.target.result; document.getElementById('cameraContent').innerHTML = `<img src="${selectedImage}" style="width:100%; max-height:60vh; object-fit:contain; border-radius:28px"><div style="display:flex; gap:15px; margin-top:20px"><button class="btn-secondary" onclick="clearImage()">Ta bort</button><button class="btn-primary" onclick="submitPost()">📤 Posta</button></div>`; }; reader.readAsDataURL(file); }; input.click(); }
        function clearImage() { selectedImage = null; document.getElementById('cameraContent').innerHTML = `<div style="text-align:center"><div style="font-size:70px; margin-bottom:20px">🐾</div><button class="btn-primary" onclick="selectImage()">📷 Välj bild</button></div>`; }
        function submitPost() { if (selectedImage) { posts.unshift({ id: Date.now().toString(), userName: user.name, userAvatar: '👤', petEmoji: PET_TYPES[user.petType].emoji, content: 'Kolla in mitt äventyr! 🔥', likes: 0, timeAgo: 'just nu' }); selectedImage = null; closeCamera(); renderFeed(); switchWorldLocation('feed'); alert('✅ Inlägg publicerat!'); } }

        // ============ SWITCH WORLD LOCATION ============
        function switchWorldLocation(location) {
            currentLocation = location;
            document.getElementById('feedContainer').style.display = 'none';
            document.querySelectorAll('.location-card').forEach(card => card.classList.remove('active'));
            const locCard = document.querySelector(`.location-card[data-location="${location}"]`);
            if (locCard) locCard.classList.add('active');
            
            if (location === 'feed') { document.getElementById('feedContainer').style.display = 'block'; renderFeed(); }
            else if (location === 'shop') openShop();
            else if (location === 'bounties') openBounties();
            else if (location === 'world') openWorld();
            else if (location === 'profile') openProfile();
            
            const icons = { feed: 'navFeedIcon', shop: 'navShopIcon', bounties: 'navBountiesIcon', profile: 'navProfileIcon' };
            Object.keys(icons).forEach(k => { let ic = document.getElementById(icons[k]); if (ic) ic.classList.remove('active'); });
            let activeIcon = document.getElementById(icons[location] || 'navFeedIcon');
            if (activeIcon) activeIcon.classList.add('active');
        }

        init();
    </script>
</body>
</html>
