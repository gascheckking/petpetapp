<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MY PET 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Main Container */
        .app {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        /* TikTok Feed */
        .feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .feed::-webkit-scrollbar {
            display: none;
        }
        .post {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 20px 100px;
        }

        /* Pet Display */
        .pet-container {
            position: absolute;
            top: 80px;
            right: 20px;
            text-align: center;
            z-index: 20;
        }
        .pet-avatar {
            font-size: 90px;
            filter: drop-shadow(0 0 20px rgba(57, 255, 20, 0.6));
            animation: petFloat 3s ease-in-out infinite;
            transition: all 0.3s;
        }
        @keyframes petFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }
        .pet-level {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #39FF14;
            margin-top: 8px;
            border: 1px solid rgba(57,255,20,0.3);
            font-weight: bold;
        }
        .pet-name {
            color: #fff;
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.8;
        }

        /* Post Content */
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .post-name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }
        .post-time {
            font-size: 11px;
            color: #888;
        }
        .post-text {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 16px;
            line-height: 1.4;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .post-image {
            width: 100%;
            max-height: 300px;
            border-radius: 20px;
            margin-top: 10px;
            object-fit: cover;
        }

        /* Action Sidebar */
        .actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 20;
        }
        .action {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action:active {
            transform: scale(0.85);
        }
        .action-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        .action-count {
            font-size: 11px;
            color: #fff;
            margin-top: 4px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            padding: 10px 20px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .nav-icon {
            font-size: 24px;
            opacity: 0.5;
            transition: all 0.2s;
        }
        .nav-icon.active {
            opacity: 1;
            transform: scale(1.1);
        }
        .nav-camera {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            width: 52px;
            height: 52px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            box-shadow: 0 0 20px rgba(57,255,20,0.4);
        }
        .nav-label {
            font-size: 10px;
            color: #888;
        }
        .nav-label.active {
            color: #39FF14;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
        }
        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .hidden {
            display: none;
        }

        /* Camera Preview */
        .camera-preview {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-img {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }
        .camera-buttons {
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 14px 28px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            padding: 14px 28px;
            border-radius: 30px;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        /* Profile Screen */
        .profile-screen {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }
        .profile-header {
            text-align: center;
            padding: 30px 0;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 16px;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #39FF14;
        }
        .pet-detail {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .exp-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #39FF14, #ff3333);
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .abilities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }
        .ability {
            background: rgba(57,255,20,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(57,255,20,0.3);
        }

        /* Nearby Screen */
        .nearby-screen {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }
        .challenge-card {
            background: linear-gradient(135deg, rgba(57,255,20,0.1), rgba(255,51,51,0.1));
            border-radius: 25px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(57,255,20,0.3);
        }
        .friends-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .friend-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            width: calc(50% - 6px);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .friend-card:active {
            transform: scale(0.97);
        }
        .meet-btn {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Leaderboard */
        .leaderboard {
            margin-top: 20px;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            margin-bottom: 8px;
        }
        .rank {
            width: 35px;
            font-size: 18px;
            font-weight: bold;
            color: #39FF14;
        }

        /* Badges */
        .badges-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }
        .badge {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            min-width: 80px;
        }
        .badge.unlocked {
            background: linear-gradient(135deg, rgba(57,255,20,0.2), rgba(255,51,51,0.2));
            border: 1px solid rgba(57,255,20,0.5);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Feed -->
        <div id="feedContainer" class="feed"></div>

        <!-- Camera Modal -->
        <div id="cameraModal" class="modal hidden">
            <div class="modal-header">
                <button class="btn-secondary" onclick="closeCamera()">Stäng</button>
                <span style="font-weight:bold">📸 Nytt inlägg</span>
                <div style="width:50px"></div>
            </div>
            <div class="camera-preview" id="cameraPreview">
                <div style="text-align:center">
                    <div style="font-size:60px; margin-bottom:20px">🐾</div>
                    <button class="btn-primary" onclick="selectImage()">Välj bild</button>
                </div>
            </div>
            <div class="camera-buttons" id="postButtons" style="display:none">
                <button class="btn-secondary" onclick="clearImage()">Ta bort</button>
                <button class="btn-primary" onclick="submitPost()">📤 Posta</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="switchTab('feed')">
                <span class="nav-icon" id="navFeedIcon">🔥</span>
                <span class="nav-label" id="navFeedLabel">Feed</span>
            </button>
            <button class="nav-item" onclick="openCamera()">
                <div class="nav-camera"><span>📸</span></div>
                <span class="nav-label">Posta</span>
            </button>
            <button class="nav-item" onclick="switchTab('nearby')">
                <span class="nav-icon" id="navNearbyIcon">📍</span>
                <span class="nav-label" id="navNearbyLabel">Nära</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile')">
                <span class="nav-icon" id="navProfileIcon">👤</span>
                <span class="nav-label" id="navProfileLabel">Min</span>
            </button>
        </div>
    </div>

    <script>
        // ============ PET DATA ============
        const PET_TYPES = {
            dragon: { name: 'Eldraken', emoji: '🐉', baseEmoji: '🐉', abilities: ['🔥 Fire Breath', '🪽 Fly', '⚡ Lightning'] },
            wolf: { name: 'Skuggvarg', emoji: '🐺', baseEmoji: '🐺', abilities: ['🌙 Howl', '🏃 Hunt', '👁️ Sense'] },
            phoenix: { name: 'Fenix', emoji: '🔥', baseEmoji: '🔥', abilities: ['✨ Rebirth', '🕊️ Fly', '❤️ Heal'] },
            fox: { name: 'MagiRäv', emoji: '🦊', baseEmoji: '🦊', abilities: ['🌀 Charm', '⚡ Dash', '🔮 Magic'] }
        };

        // ============ USER DATA ============
        let user = {
            id: 'user1',
            name: '',
            petType: 'dragon',
            petLevel: 1,
            petExp: 0,
            streak: 0,
            meetings: 0,
            badges: [],
            posts: []
        };

        // ============ MOCK DATA ============
        let posts = [
            { id: 'p1', userId: 'ella', userName: 'Ella', userAvatar: '👩‍🎤', petEmoji: '🐉', content: 'Mötte Max idag! 🔥 Vår pet spelade ihop!', likes: 47, timeAgo: '15 min', image: null },
            { id: 'p2', userId: 'max', userName: 'Max', userAvatar: '🧑‍🚀', petEmoji: '🐺', content: 'Level up! Min varg är nu level 8 💀', likes: 32, timeAgo: '1 tim', image: null },
            { id: 'p3', userId: 'clara', userName: 'Clara', userAvatar: '👩‍💻', petEmoji: '🦊', content: 'Hittade en legendary skin! ✨', likes: 89, timeAgo: '3 tim', image: null }
        ];

        let friends = [
            { id: 'ella', name: 'Ella', avatar: '👩‍🎤', petEmoji: '🐉', petLevel: 12, distance: '300m' },
            { id: 'max', name: 'Max', avatar: '🧑‍🚀', petEmoji: '🐺', petLevel: 8, distance: '800m' },
            { id: 'clara', name: 'Clara', avatar: '👩‍💻', petEmoji: '🦊', petLevel: 5, distance: '1.2km' },
            { id: 'leo', name: 'Leo', avatar: '🧑‍🎤', petEmoji: '🐱', petLevel: 3, distance: '2km' }
        ];

        let leaderboard = [
            { name: 'Ella', petLevel: 12, streak: 47 },
            { name: 'Max', petLevel: 8, streak: 32 },
            { name: 'Clara', petLevel: 5, streak: 28 },
            { name: 'Du', petLevel: 1, streak: 0 }
        ];

        let dailyQuest = {
            title: 'Träffa 2 kompisar',
            description: 'Möt vänner IRL och få din pet att växa',
            progress: 0,
            required: 2,
            reward: '250 XP + 🎁 Rare Skin'
        };

        let currentTab = 'feed';
        let selectedImage = null;

        // ============ INIT ============
        function init() {
            const saved = localStorage.getItem('mypet_user');
            if (saved) {
                user = JSON.parse(saved);
            } else {
                let name = prompt('🔥 Välkommen till MY PET!\n\nVad heter du?', 'Din vän');
                if (name) {
                    user.name = name;
                    saveUser();
                }
            }
            updateLeaderboard();
            renderFeed();
            switchTab('feed');
        }

        function saveUser() {
            localStorage.setItem('mypet_user', JSON.stringify(user));
        }

        // ============ FEED ============
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            if (!container) return;

            const pet = PET_TYPES[user.petType];
            
            container.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="pet-container">
                        <div class="pet-avatar">${pet.emoji}</div>
                        <div class="pet-level">Lv.${user.petLevel}</div>
                        <div class="pet-name">${pet.name}</div>
                    </div>
                    
                    <div class="actions">
                        <div class="action" onclick="likePost('${post.id}')">
                            <div class="action-icon">❤️</div>
                            <div class="action-count">${post.likes}</div>
                        </div>
                        <div class="action" onclick="sharePost('${post.id}')">
                            <div class="action-icon">📤</div>
                        </div>
                    </div>
                    
                    <div class="post-content">
                        <div class="post-user">
                            <div class="post-avatar">${post.userAvatar}</div>
                            <div>
                                <div class="post-name">${post.userName} · ${post.petEmoji}</div>
                                <div class="post-time">${post.timeAgo}</div>
                            </div>
                        </div>
                        <div class="post-text">${post.content}</div>
                        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                    </div>
                </div>
            `).join('');
        }

        function likePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.likes++;
                renderFeed();
                // Animation feedback
                const btn = event.currentTarget;
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => btn.style.transform = '', 200);
            }
        }

        function sharePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                const shareText = `🔥 ${post.content}\n\nMin pet är level ${user.petLevel}!\nLadda ner MY PET!`;
                if (navigator.share) {
                    navigator.share({ title: 'MY PET', text: shareText });
                } else {
                    alert(shareText);
                }
            }
        }

        // ============ CAMERA ============
        function openCamera() {
            document.getElementById('cameraModal').classList.remove('hidden');
        }

        function closeCamera() {
            document.getElementById('cameraModal').classList.add('hidden');
            selectedImage = null;
            document.getElementById('cameraPreview').innerHTML = `
                <div style="text-align:center">
                    <div style="font-size:60px; margin-bottom:20px">🐾</div>
                    <button class="btn-primary" onclick="selectImage()">Välj bild</button>
                </div>
            `;
            document.getElementById('postButtons').style.display = 'none';
        }

        function selectImage() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = (event) => {
                    selectedImage = event.target.result;
                    document.getElementById('cameraPreview').innerHTML = `<img src="${selectedImage}" class="preview-img">`;
                    document.getElementById('postButtons').style.display = 'flex';
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function clearImage() {
            selectedImage = null;
            document.getElementById('cameraPreview').innerHTML = `
                <div style="text-align:center">
                    <div style="font-size:60px; margin-bottom:20px">🐾</div>
                    <button class="btn-primary" onclick="selectImage()">Välj bild</button>
                </div>
            `;
            document.getElementById('postButtons').style.display = 'none';
        }

        function submitPost() {
            if (selectedImage) {
                const newPost = {
                    id: Date.now().toString(),
                    userId: user.id,
                    userName: user.name,
                    userAvatar: '👤',
                    petEmoji: PET_TYPES[user.petType].emoji,
                    content: 'Kolla in mitt äventyr! 🔥',
                    likes: 0,
                    timeAgo: 'just nu',
                    image: selectedImage
                };
                posts.unshift(newPost);
                selectedImage = null;
                closeCamera();
                renderFeed();
                switchTab('feed');
            }
        }

        // ============ MEET FRIENDS ============
        function meetFriend(friendId, friendName) {
            // Add XP
            user.petExp += 15;
            user.meetings++;
            user.streak++;
            
            // Level up
            let leveledUp = false;
            if (user.petExp >= 100) {
                user.petExp -= 100;
                user.petLevel++;
                leveledUp = true;
            }
            
            // Update daily quest
            dailyQuest.progress = Math.min(dailyQuest.progress + 1, dailyQuest.required);
            
            // Check quest completion
            if (dailyQuest.progress >= dailyQuest.required) {
                user.petExp += 250;
                alert(`🎉 QUEST KLAR! Du fick: ${dailyQuest.reward} + 250 XP!`);
                dailyQuest.progress = 0;
                
                // Check for level up after quest reward
                if (user.petExp >= 100) {
                    user.petExp -= 100;
                    user.petLevel++;
                    leveledUp = true;
                }
            }
            
            // Check for badges
            if (user.meetings >= 10 && !user.badges.includes('social')) {
                user.badges.push('social');
                alert('🏆 NY BADGE! Social Butterfly - 10 IRL-möten!');
            }
            if (user.streak >= 7 && !user.badges.includes('streak7')) {
                user.badges.push('streak7');
                alert('🏆 NY BADGE! On Fire - 7 dagars streak!');
            }
            if (user.petLevel >= 10 && !user.badges.includes('level10')) {
                user.badges.push('level10');
                alert('🏆 NY BADGE! Master - Pet level 10!');
            }
            
            saveUser();
            updateLeaderboard();
            renderNearby();
            renderProfile();
            
            if (leveledUp) {
                alert(`🎉 LEVEL UP! Din ${PET_TYPES[user.petType].name} är nu level ${user.petLevel}!`);
                // Unlock new ability at certain levels
                if (user.petLevel === 5 || user.petLevel === 10 || user.petLevel === 15) {
                    alert(`✨ Ny ability upplåst! ${PET_TYPES[user.petType].abilities[Math.floor(user.petLevel/5)]}`);
                }
            }
            
            alert(`✅ Du mötte ${friendName}! +15 XP till din pet`);
            renderFeed(); // Update pet level in feed
        }

        // ============ NEARBY ============
        function renderNearby() {
            const container = document.getElementById('nearbyContainer');
            if (!container) return;
            
            const questPercent = (dailyQuest.progress / dailyQuest.required) * 100;
            
            container.innerHTML = `
                <div class="challenge-card">
                    <div style="font-size:12px; color:#39FF14">⚡️ DAGENS UTMANING</div>
                    <div style="font-size:16px; font-weight:bold; margin:8px 0">${dailyQuest.title}</div>
                    <div style="font-size:12px; color:#888; margin-bottom:12px">${dailyQuest.description}</div>
                    <div class="exp-bar"><div class="exp-fill" style="width:${questPercent}%"></div></div>
                    <div style="display:flex; justify-content:space-between; margin-top:8px">
                        <span>${dailyQuest.progress}/${dailyQuest.required}</span>
                        <span style="color:#39FF14">🎁 ${dailyQuest.reward}</span>
                    </div>
                </div>
                
                <div style="margin-bottom:15px">
                    <div style="font-weight:bold; margin-bottom:12px">📍 VÄNNER I NÄRHETEN</div>
                    <div class="friends-grid">
                        ${friends.map(friend => `
                            <div class="friend-card" onclick="meetFriend('${friend.id}', '${friend.name}')">
                                <div style="font-size:50px">${friend.avatar}</div>
                                <div style="font-weight:bold; margin:8px 0">${friend.name}</div>
                                <div>${friend.petEmoji} Lv.${friend.petLevel}</div>
                                <div style="font-size:11px; color:#888; margin:5px 0">${friend.distance}</div>
                                <button class="meet-btn">🤝 MÖT</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="leaderboard">
                    <div style="font-weight:bold; margin-bottom:12px">🏆 TOPPLISTA</div>
                    ${leaderboard.map((item, idx) => `
                        <div class="leaderboard-item">
                            <div class="rank">${idx === 0 ? '👑' : idx === 1 ? '⭐' : idx === 2 ? '🔥' : `${idx+1}`}</div>
                            <div style="flex:1">${item.name}</div>
                            <div style="color:#39FF14">Lv.${item.petLevel}</div>
                            <div style="font-size:11px; color:#888">${item.streak}d</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ============ PROFILE ============
        function renderProfile() {
            const container = document.getElementById('profileContainer');
            if (!container) return;
            
            const pet = PET_TYPES[user.petType];
            const expPercent = (user.petExp / 100) * 100;
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${pet.emoji}</div>
                    <div style="font-size:24px; font-weight:bold">${user.name}</div>
                    <div style="color:#888">${pet.name} · Level ${user.petLevel}</div>
                </div>
                
                <div class="stats-row">
                    <div class="stat"><div class="stat-value">${user.streak}</div><div>Streak</div></div>
                    <div class="stat"><div class="stat-value">${user.meetings}</div><div>Möten</div></div>
                    <div class="stat"><div class="stat-value">${user.badges.length}</div><div>Badges</div></div>
                </div>
                
                <div class="pet-detail">
                    <div style="font-size:60px; margin-bottom:10px">${pet.emoji}</div>
                    <div class="exp-bar"><div class="exp-fill" style="width:${expPercent}%"></div></div>
                    <div>${user.petExp}/100 XP till level ${user.petLevel + 1}</div>
                    
                    <div class="abilities">
                        ${pet.abilities.map(a => `<span class="ability">${a}</span>`).join('')}
                    </div>
                </div>
                
                <div>
                    <div style="font-weight:bold; margin-bottom:12px">🏆 BADGES</div>
                    <div class="badges-grid">
                        <div class="badge ${user.badges.includes('social') ? 'unlocked' : ''}">
                            <div style="font-size:30px">🦋</div>
                            <div style="font-size:11px">Social Butterfly</div>
                        </div>
                        <div class="badge ${user.badges.includes('streak7') ? 'unlocked' : ''}">
                            <div style="font-size:30px">🔥</div>
                            <div style="font-size:11px">On Fire</div>
                        </div>
                        <div class="badge ${user.badges.includes('level10') ? 'unlocked' : ''}">
                            <div style="font-size:30px">👑</div>
                            <div style="font-size:11px">Master</div>
                        </div>
                    </div>
                </div>
                
                <button onclick="shareProfile()" style="width:100%; background:rgba(255,255,255,0.05); padding:16px; border-radius:30px; border:1px solid rgba(255,255,255,0.1); color:#fff; margin-top:20px; cursor:pointer">
                    📤 DELA PROFIL
                </button>
            `;
        }

        function shareProfile() {
            const pet = PET_TYPES[user.petType];
            const shareText = `🔥 ${user.name} - ${pet.name} Level ${user.petLevel}!\n${user.streak} dagars streak!\n${user.meetings} IRL-möten!\n\nLadda ner MY PET och tävla med oss!`;
            if (navigator.share) {
                navigator.share({ title: 'MY PET', text: shareText });
            } else {
                alert(shareText);
            }
        }

        function updateLeaderboard() {
            const userIndex = leaderboard.findIndex(l => l.name === 'Du');
            if (userIndex !== -1) {
                leaderboard[userIndex] = { name: 'Du', petLevel: user.petLevel, streak: user.streak };
            }
            leaderboard.sort((a, b) => b.petLevel - a.petLevel);
        }

        // ============ TAB NAVIGATION ============
        function switchTab(tab) {
            currentTab = tab;
            
            // Hide all screens
            document.getElementById('feedContainer').style.display = 'none';
            const nearbyEl = document.getElementById('nearbyScreen');
            const profileEl = document.getElementById('profileScreen');
            
            // Create screens if not exist
            if (!nearbyEl) {
                const div = document.createElement('div');
                div.id = 'nearbyScreen';
                div.className = 'nearby-screen';
                div.style.display = 'none';
                div.innerHTML = '<div id="nearbyContainer"></div>';
                document.querySelector('.app').insertBefore(div, document.querySelector('.bottom-nav'));
            }
            if (!profileEl) {
                const div = document.createElement('div');
                div.id = 'profileScreen';
                div.className = 'profile-screen';
                div.style.display = 'none';
                div.innerHTML = '<div id="profileContainer"></div>';
                document.querySelector('.app').insertBefore(div, document.querySelector('.bottom-nav'));
            }
            
            const newNearby = document.getElementById('nearbyScreen');
            const newProfile = document.getElementById('profileScreen');
            
            if (newNearby) newNearby.style.display = 'none';
            if (newProfile) newProfile.style.display = 'none';
            
            if (tab === 'feed') {
                document.getElementById('feedContainer').style.display = 'block';
                renderFeed();
            }
            if (tab === 'nearby') {
                if (newNearby) {
                    newNearby.style.display = 'block';
                    renderNearby();
                }
            }
            if (tab === 'profile') {
                if (newProfile) {
                    newProfile.style.display = 'block';
                    renderProfile();
                }
            }
            
            // Update nav icons
            const icons = { feed: 'navFeedIcon', nearby: 'navNearbyIcon', profile: 'navProfileIcon' };
            const labels = { feed: 'navFeedLabel', nearby: 'navNearbyLabel', profile: 'navProfileLabel' };
            
            Object.keys(icons).forEach(t => {
                const icon = document.getElementById(icons[t]);
                const label = document.getElementById(labels[t]);
                if (icon) icon.classList.remove('active');
                if (label) label.classList.remove('active');
            });
            
            const activeIcon = document.getElementById(icons[tab]);
            const activeLabel = document.getElementById(labels[tab]);
            if (activeIcon) activeIcon.classList.add('active');
            if (activeLabel) activeLabel.classList.add('active');
        }

        // Start app
        init();
    </script>
</body>
</html>
