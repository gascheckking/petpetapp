<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MY PET WORLD ✨</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://emojicdn.elk.sh/🐉">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* App Container */
        .app {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(ellipse at 20% 30%, #1a0a2a, #000000);
        }

        /* ============ TIKTOK-STYLE FEED ============ */
        .feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .feed::-webkit-scrollbar {
            display: none;
        }
        .post {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(0,0,0,0.98) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 20px 100px;
            backdrop-filter: blur(2px);
        }
        .post::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(57,255,20,0.05), transparent 70%);
            pointer-events: none;
        }

        /* ============ PET DISPLAY (LIVING PET) ============ */
        .pet-container {
            position: absolute;
            top: 100px;
            right: 20px;
            text-align: center;
            z-index: 20;
            animation: slideInRight 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .pet-avatar {
            font-size: 95px;
            filter: drop-shadow(0 0 25px rgba(57, 255, 20, 0.7)) drop-shadow(0 0 5px rgba(255,51,51,0.5));
            animation: petFloat 3s ease-in-out infinite;
            transition: all 0.3s;
        }
        .pet-avatar:active {
            transform: scale(0.95);
            filter: drop-shadow(0 0 35px rgba(57,255,20,1));
        }
        @keyframes petFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .pet-level {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: bold;
            color: #39FF14;
            margin-top: 8px;
            border: 1px solid rgba(57,255,20,0.4);
            box-shadow: 0 0 15px rgba(57,255,20,0.2);
            letter-spacing: 1px;
        }
        .pet-name {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 5px;
            font-weight: 500;
        }

        /* ============ POST CONTENT ============ */
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            animation: fadeInUp 0.4s ease-out;
        }
        .post-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 20px rgba(57,255,20,0.3);
            transition: transform 0.2s;
        }
        .post-name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .post-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        .post-text {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 16px;
            line-height: 1.4;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease-out;
        }
        .post-image {
            width: 100%;
            max-height: 320px;
            border-radius: 24px;
            margin-top: 12px;
            object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: zoomIn 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ============ ACTION SIDEBAR ============ */
        .actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 20;
        }
        .action {
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .action:active {
            transform: scale(0.85);
        }
        .action-icon {
            font-size: 34px;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
            transition: all 0.2s;
        }
        .action:hover .action-icon {
            transform: scale(1.1);
        }
        .action-count {
            font-size: 11px;
            color: #fff;
            margin-top: 5px;
            font-weight: 600;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        /* ============ BOTTOM NAVIGATION (GLASS) ============ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(25px);
            padding: 12px 20px 25px;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.3);
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-icon {
            font-size: 26px;
            opacity: 0.5;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .nav-icon.active {
            opacity: 1;
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px rgba(57,255,20,0.5));
        }
        .nav-camera {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -22px;
            box-shadow: 0 0 25px rgba(57,255,20,0.5);
            transition: all 0.2s;
        }
        .nav-camera:active {
            transform: scale(0.95);
        }
        .nav-label {
            font-size: 10px;
            color: #888;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-label.active {
            color: #39FF14;
        }

        /* ============ MODALS (GLASS) ============ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(30px);
            z-index: 200;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; backdrop-filter: blur(0); }
            to { opacity: 1; backdrop-filter: blur(30px); }
        }
        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .hidden {
            display: none;
        }

        /* ============ BUTTONS ============ */
        .btn-primary {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 14px 28px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(57,255,20,0.3);
        }
        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(57,255,20,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.15);
        }

        /* ============ CARDS & ITEMS ============ */
        .shop-item, .bounty-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }
        .shop-item:active, .bounty-card:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.08);
        }
        .code-box {
            background: rgba(26,26,26,0.8);
            backdrop-filter: blur(10px);
            padding: 14px;
            border-radius: 20px;
            text-align: center;
            margin-top: 10px;
            border: 1px solid rgba(57,255,20,0.2);
        }
        .shop-card, .claim-card {
            background: linear-gradient(135deg, rgba(57,255,20,0.08), rgba(255,51,51,0.08));
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(57,255,20,0.2);
        }

        /* ============ PROFILE SCREEN ============ */
        .profile-screen, .nearby-screen, .bounties-screen {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }
        .profile-header {
            text-align: center;
            padding: 30px 0;
            animation: fadeInUp 0.5s ease-out;
        }
        .profile-avatar {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #39FF14, #ff3333);
            border-radius: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            margin: 0 auto 16px;
            box-shadow: 0 0 30px rgba(57,255,20,0.4);
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(57,255,20,0.3); }
            50% { box-shadow: 0 0 40px rgba(57,255,20,0.6); }
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin: 20px 0;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #39FF14;
            text-shadow: 0 0 10px rgba(57,255,20,0.3);
        }
        .stat-label {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
        }
        .pet-detail {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 22px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .exp-bar {
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            margin: 18px 0;
            overflow: hidden;
        }
        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #39FF14, #ff3333);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(57,255,20,0.5);
        }
        .abilities {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 18px;
        }
        .ability {
            background: rgba(57,255,20,0.12);
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 12px;
            border: 1px solid rgba(57,255,20,0.25);
            backdrop-filter: blur(5px);
        }

        /* ============ NEARBY & FRIENDS ============ */
        .friends-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        .friend-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 18px;
            width: calc(50% - 7px);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .friend-card:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.08);
        }
        .meet-btn {
            background: linear-gradient(135deg, #39FF14, #ff3333);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            margin-top: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .meet-btn:active {
            transform: scale(0.95);
        }
        .challenge-card {
            background: linear-gradient(135deg, rgba(57,255,20,0.12), rgba(255,51,51,0.08));
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(57,255,20,0.25);
        }

        /* ============ BOUNTY STATUS ============ */
        .claim-status {
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-weight: 600;
        }
        .status-approved {
            background: #39FF14;
            color: #000;
            box-shadow: 0 0 10px rgba(57,255,20,0.5);
        }
        .status-pending {
            background: #ff9900;
            color: #000;
        }
        .status-rejected {
            background: #ff3333;
            color: #fff;
        }

        /* ============ LEADERBOARD ============ */
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .rank {
            width: 38px;
            font-size: 18px;
            font-weight: bold;
            color: #39FF14;
        }

        /* Camera Preview */
        .preview-img {
            width: 100%;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 28px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Feed Container -->
        <div id="feedContainer" class="feed"></div>

        <!-- Shop Modal -->
        <div id="shopModal" class="modal hidden">
            <div class="modal-header">
                <button class="btn-secondary" onclick="closeShop()">Stäng</button>
                <span style="font-weight:bold; font-size:18px">🛍️ MY PET SHOP</span>
                <div style="width:50px"></div>
            </div>
            <div class="modal-content" id="shopContent"></div>
        </div>

        <!-- Camera Modal -->
        <div id="cameraModal" class="modal hidden">
            <div class="modal-header">
                <button class="btn-secondary" onclick="closeCamera()">Stäng</button>
                <span style="font-weight:bold; font-size:18px">📸 Skapa inlägg</span>
                <div style="width:50px"></div>
            </div>
            <div class="modal-content" id="cameraContent" style="display:flex; flex-direction:column; align-items:center; justify-content:center">
                <div style="text-align:center">
                    <div style="font-size:70px; margin-bottom:20px; animation: pulseGlow 2s infinite">🐾</div>
                    <button class="btn-primary" onclick="selectImage()">📷 Välj bild</button>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="switchTab('feed')">
                <span class="nav-icon" id="navFeedIcon">🔥</span>
                <span class="nav-label" id="navFeedLabel">Hem</span>
            </button>
            <button class="nav-item" onclick="switchTab('shop')">
                <span class="nav-icon" id="navShopIcon">🛍️</span>
                <span class="nav-label" id="navShopLabel">Shop</span>
            </button>
            <button class="nav-item" onclick="openCamera()">
                <div class="nav-camera"><span>📸</span></div>
                <span class="nav-label">Nytt</span>
            </button>
            <button class="nav-item" onclick="switchTab('bounties')">
                <span class="nav-icon" id="navBountiesIcon">🎯</span>
                <span class="nav-label" id="navBountiesLabel">Uppdrag</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile')">
                <span class="nav-icon" id="navProfileIcon">👤</span>
                <span class="nav-label" id="navProfileLabel">Min</span>
            </button>
        </div>
    </div>

    <script>
        // ============ PET DATA ============
        const PET_TYPES = {
            dragon: { name: 'Eldraken', emoji: '🐉', abilities: ['🔥 Fire Breath', '🪽 Fly', '⚡ Lightning'] },
            wolf: { name: 'Skuggvarg', emoji: '🐺', abilities: ['🌙 Howl', '🏃 Hunt', '👁️ Sense'] },
            phoenix: { name: 'Fenix', emoji: '🔥', abilities: ['✨ Rebirth', '🕊️ Fly', '❤️ Heal'] },
            fox: { name: 'MagiRäv', emoji: '🦊', abilities: ['🌀 Charm', '⚡ Dash', '🔮 Magic'] }
        };

        // ============ USER DATA ============
        let user = {
            id: 'user1', name: '', petType: 'dragon', petLevel: 1, petExp: 0,
            coins: 500, streak: 0, meetings: 0, badges: [], collectedCodes: []
        };

        // ============ SHOP DATA ============
        let shopItems = [
            { id: 'skin1', name: '🔥 Fire Wings', price: 200, emoji: '🔥' },
            { id: 'skin2', name: '✨ Legendary Glow', price: 500, emoji: '✨' },
            { id: 'item1', name: '⚡ XP Boost', price: 100, emoji: '⚡' },
            { id: 'skin3', name: '👑 Royal Crown', price: 800, emoji: '👑' }
        ];
        let discountCodes = [
            { code: 'MYPET20', discount: 20, partner: 'Svenska Spel' },
            { code: 'WELCOME10', discount: 10, partner: 'Welcome Deal' }
        ];
        let irlShops = [
            { name: '🐉 Drake Spelbutik', address: 'Tumba Centrum', distance: '500m', discount: '15% rabatt' },
            { name: '🦊 MagiRäv Café', address: 'Skärholmen', distance: '1.2km', discount: 'Gratis kaffe' },
            { name: '🔥 Fenix Lounge', address: 'Stockholm City', distance: '3km', discount: '10% på drycker' }
        ];

        // ============ BOUNTIES DATA ============
        let bounties = [
            { id: 'b1', title: '📸 Fota något blått', description: 'Hitta något blått, fota och ladda upp!', reward: 100, rewardType: 'coins', creator: 'Ella', expires: '2026-06-01', claims: [], status: 'active' },
            { id: 'b2', title: '🏃 Gå 5000 steg', description: 'Visa screenshot från stegräknaren.', reward: 150, rewardType: 'coins', creator: 'Max', expires: '2026-06-15', claims: [], status: 'active' },
            { id: 'b3', title: '☕ Besök ett café', description: 'Fota dig på ett café med kaffe.', reward: 200, rewardType: 'coins', creator: 'MY PET', expires: '2026-07-01', claims: [], status: 'active' }
        ];

        // ============ SOCIAL DATA ============
        let posts = [
            { id: 'p1', userName: 'Ella', userAvatar: '👩‍🎤', petEmoji: '🐉', content: 'Köpte Fire Wings till min drake! 🔥', likes: 47, timeAgo: '15 min', image: null },
            { id: 'p2', userName: 'Max', userAvatar: '🧑‍🚀', petEmoji: '🐺', content: 'Level 10! 🎉', likes: 32, timeAgo: '1 tim', image: null },
            { id: 'p3', userName: 'Clara', userAvatar: '👩‍💻', petEmoji: '🦊', content: 'Legendary skin! ✨', likes: 89, timeAgo: '3 tim', image: null }
        ];
        let friends = [
            { name: 'Ella', avatar: '👩‍🎤', petEmoji: '🐉', petLevel: 12, distance: '300m' },
            { name: 'Max', avatar: '🧑‍🚀', petEmoji: '🐺', petLevel: 8, distance: '800m' },
            { name: 'Clara', avatar: '👩‍💻', petEmoji: '🦊', petLevel: 5, distance: '1.2km' }
        ];
        let leaderboard = [
            { name: 'Ella', petLevel: 12, streak: 47 },
            { name: 'Max', petLevel: 8, streak: 32 },
            { name: 'Clara', petLevel: 5, streak: 28 },
            { name: 'Du', petLevel: 1, streak: 0 }
        ];
        let dailyChallenge = { title: 'Träffa 2 kompisar idag', progress: 0, required: 2, reward: '250 XP + 🎁 Rare Skin' };

        // ============ APP STATE ============
        let currentTab = 'feed';
        let selectedImage = null;

        // ============ INIT ============
        function init() {
            const saved = localStorage.getItem('mypet_user');
            if (saved) { user = JSON.parse(saved); }
            else {
                let name = prompt('✨ Välkommen till MY PET WORLD!\n\nVad heter du?', 'Din vän');
                if (name) { user.name = name; saveUser(); }
            }
            updateLeaderboard();
            renderFeed();
            switchTab('feed');
        }
        function saveUser() { localStorage.setItem('mypet_user', JSON.stringify(user)); }
        function saveBounties() { localStorage.setItem('mypet_bounties', JSON.stringify(bounties)); }
        function updateLeaderboard() {
            const idx = leaderboard.findIndex(l => l.name === 'Du');
            if (idx !== -1) leaderboard[idx] = { name: 'Du', petLevel: user.petLevel, streak: user.streak };
            leaderboard.sort((a, b) => b.petLevel - a.petLevel);
        }

        // ============ FEED ============
        function renderFeed() {
            const container = document.getElementById('feedContainer');
            if (!container) return;
            const pet = PET_TYPES[user.petType];
            container.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="pet-container">
                        <div class="pet-avatar">${pet.emoji}</div>
                        <div class="pet-level">Lv.${user.petLevel}</div>
                        <div class="pet-name">${pet.name}</div>
                    </div>
                    <div class="actions">
                        <div class="action" onclick="likePost('${post.id}')"><div class="action-icon">❤️</div><div class="action-count">${post.likes}</div></div>
                        <div class="action" onclick="sharePost('${post.id}')"><div class="action-icon">📤</div></div>
                    </div>
                    <div class="post-content">
                        <div class="post-user"><div class="post-avatar">${post.userAvatar}</div><div><div class="post-name">${post.userName} · ${post.petEmoji}</div><div class="post-time">${post.timeAgo}</div></div></div>
                        <div class="post-text">${post.content}</div>
                        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                    </div>
                </div>
            `).join('');
        }
        function likePost(id) { let p = posts.find(p => p.id === id); if (p) { p.likes++; renderFeed(); } }
        function sharePost(id) { let p = posts.find(p => p.id === id); if (p && navigator.share) navigator.share({ title: 'MY PET', text: p.content }); else alert(p?.content); }

        // ============ SHOP ============
        function renderShop() {
            const container = document.getElementById('shopContent');
            if (!container) return;
            container.innerHTML = `
                <div style="margin-bottom:20px"><div style="display:flex; justify-content:space-between"><span style="font-size:28px; font-weight:bold">💰 ${user.coins}</span><span class="pet-level">Lv.${user.petLevel}</span></div></div>
                <div><div style="font-weight:bold; margin-bottom:12px">🎟️ RABATTKODER</div>${discountCodes.map(c => `<div class="code-box"><div style="font-weight:bold">${c.code}</div><div>${c.discount}% · ${c.partner}</div><button class="shop-btn" style="margin-top:8px" onclick="claimCode('${c.code}')">Använd</button></div>`).join('')}</div>
                <div style="margin:25px 0"><div style="font-weight:bold; margin-bottom:12px">🛍️ SHOP</div>${shopItems.map(i => `<div class="shop-item"><div style="font-size:45px">${i.emoji}</div><div style="flex:1"><div style="font-weight:bold">${i.name}</div><div style="font-size:11px; color:#888">${i.price} coins</div></div><button class="shop-btn" onclick="buyItem('${i.id}', ${i.price})">Köp</button></div>`).join('')}</div>
                <div><div style="font-weight:bold; margin-bottom:12px">🏪 IRL SHOPS</div>${irlShops.map(s => `<div class="shop-card"><div style="font-weight:bold">${s.name}</div><div style="font-size:12px; color:#888">${s.address} · ${s.distance}</div><div style="font-size:12px; color:#39FF14; margin:8px 0">${s.discount}</div><button class="shop-btn" onclick="visitShop('${s.name}')">🎮 Spela in</button></div>`).join('')}</div>
            `;
        }
        function buyItem(id, price) { if (user.coins >= price) { user.coins -= price; saveUser(); alert(`✅ Köpte ${shopItems.find(i => i.id === id).name}!`); renderShop(); renderProfile(); } else alert(`❌ Behöver ${price - user.coins} mer coins`); }
        function claimCode(code) { if (user.collectedCodes.includes(code)) { alert('❌ Redan använd'); return; } user.coins += 100; user.collectedCodes.push(code); saveUser(); alert(`✅ +100 coins!`); renderShop(); renderProfile(); }
        function visitShop(name) { user.coins += 50; user.meetings++; user.petExp += 15; if (user.petExp >= 100) { user.petExp = 0; user.petLevel++; alert(`🎉 LEVEL UP! Level ${user.petLevel}!`); } saveUser(); alert(`🎮 +50 coins, +15 XP!`); renderShop(); renderProfile(); }
        function openShop() { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); }
        function closeShop() { document.getElementById('shopModal').classList.add('hidden'); }

        // ============ BOUNTIES ============
        function renderBounties() {
            const container = document.getElementById('bountiesContainer');
            if (!container) return;
            let myClaims = [];
            bounties.forEach(b => b.claims.forEach(c => { if (c.userId === user.id) myClaims.push({ ...c, bountyTitle: b.title, reward: b.reward }); }));
            container.innerHTML = `
                <div><div style="display:flex; justify-content:space-between"><span style="font-size:22px; font-weight:bold">🎯 UPPDRAG</span><span class="pet-level">💰 ${user.coins}</span></div></div>
                ${bounties.filter(b => b.status === 'active').map(b => `
                    <div class="bounty-card" style="flex-direction:column; align-items:flex-start">
                        <div style="display:flex; justify-content:space-between; width:100%"><span style="font-weight:bold">${b.title}</span><span style="color:#39FF14">+${b.reward}</span></div>
                        <div style="font-size:12px; color:#888">${b.description}</div>
                        <button class="bounty-btn" style="margin-top:10px" onclick="claimBounty('${b.id}')">🎯 Gör uppdrag</button>
                    </div>
                `).join('')}
                <div style="margin:25px 0"><div style="font-weight:bold">📋 MINA UPPDRAG</div>${myClaims.length === 0 ? '<div style="color:#555; text-align:center; padding:20px">Inga uppdrag än</div>' : myClaims.map(c => `<div class="claim-card"><div style="font-weight:bold">${c.bountyTitle}</div><div><span class="claim-status ${c.status === 'approved' ? 'status-approved' : c.status === 'rejected' ? 'status-rejected' : 'status-pending'}">${c.status === 'approved' ? '✅ Godkänd' : c.status === 'rejected' ? '❌ Avslagen' : '⏳ Väntar'}</span></div>${c.status === 'approved' ? `<div style="color:#39FF14">+${c.reward} coins!</div>` : ''}</div>`).join('')}</div>
                <button class="btn-primary" onclick="createBounty()">➕ SKAPA UPPDRAG</button>
            `;
        }
        function claimBounty(bountyId) {
            let bounty = bounties.find(b => b.id === bountyId);
            if (!bounty) return;
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = (ev) => {
                    let desc = prompt('Beskriv ditt bevis:', 'Jag gjorde uppdraget!');
                    bounty.claims.push({ id: Date.now().toString(), bountyId, userId: user.id, userName: user.name, proofImage: ev.target.result, description: desc || '', timestamp: new Date().toISOString(), status: 'pending' });
                    saveBounties();
                    alert(`✅ Uppdrag inskickat! Väntar på godkännande.`);
                    renderBounties();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        function createBounty() {
            let title = prompt('Vad heter uppdraget?', '📸 Fota något');
            if (!title) return;
            let desc = prompt('Beskriv vad man ska göra:', 'Fota och ladda upp');
            if (!desc) return;
            let reward = parseInt(prompt('Belöning i coins:', '100'));
            if (isNaN(reward)) return;
            bounties.push({ id: 'b' + Date.now(), title, description: desc, reward, rewardType: 'coins', creator: user.name, expires: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0], claims: [], status: 'active' });
            saveBounties();
            alert(`✅ Uppdrag "${title}" skapat!`);
            renderBounties();
        }

        // ============ PROFILE ============
        function renderProfile() {
            const container = document.getElementById('profileContainer');
            if (!container) return;
            const pet = PET_TYPES[user.petType];
            const expPercent = (user.petExp / 100) * 100;
            let myClaims = [];
            bounties.forEach(b => b.claims.forEach(c => { if (c.userId === user.id) myClaims.push({ ...c, bountyTitle: b.title, reward: b.reward }); }));
            container.innerHTML = `
                <div class="profile-header"><div class="profile-avatar">${pet.emoji}</div><div style="font-size:26px; font-weight:bold">${user.name}</div><div style="color:#888">${pet.name} · Level ${user.petLevel}</div></div>
                <div class="stats-row"><div class="stat"><div class="stat-value">${user.streak}</div><div class="stat-label">Streak</div></div><div class="stat"><div class="stat-value">${user.meetings}</div><div class="stat-label">Möten</div></div><div class="stat"><div class="stat-value">${user.coins}</div><div class="stat-label">Coins</div></div></div>
                <div class="pet-detail"><div class="exp-bar"><div class="exp-fill" style="width:${expPercent}%"></div></div><div>${user.petExp}/100 XP till level ${user.petLevel + 1}</div><div class="abilities">${pet.abilities.map(a => `<span class="ability">${a}</span>`).join('')}</div></div>
                <div><div style="font-weight:bold">📋 MINA UPPDRAG</div>${myClaims.length === 0 ? '<div style="color:#555; text-align:center; padding:20px">Inga uppdrag</div>' : myClaims.map(c => `<div class="claim-card"><div>${c.bountyTitle}</div><span class="claim-status ${c.status === 'approved' ? 'status-approved' : c.status === 'rejected' ? 'status-rejected' : 'status-pending'}">${c.status === 'approved' ? '✅ Godkänd' : c.status === 'rejected' ? '❌ Avslagen' : '⏳ Väntar'}</span>${c.status === 'approved' ? `<div style="color:#39FF14">+${c.reward}</div>` : ''}</div>`).join('')}</div>
                <div style="margin:20px 0"><div style="font-weight:bold">🏆 TOPPLISTA</div>${leaderboard.map((item, idx) => `<div class="leaderboard-item"><div class="rank">${idx === 0 ? '👑' : idx === 1 ? '⭐' : idx === 2 ? '🔥' : `${idx+1}`}</div><div style="flex:1">${item.name}</div><div style="color:#39FF14">Lv.${item.petLevel}</div><div style="font-size:11px; color:#888">${item.streak}d</div></div>`).join('')}</div>
                <button class="btn-primary" onclick="shareProfile()">📤 DELA PROFIL</button>
            `;
        }
        function shareProfile() { const shareText = `🔥 ${user.name} - Level ${user.petLevel} pet! ${user.streak} dagars streak!`; if (navigator.share) navigator.share({ title: 'MY PET', text: shareText }); else alert(shareText); }

        // ============ NEARBY ============
        function meetFriend(name) {
            user.meetings++; user.streak++; user.petExp += 15;
            if (user.petExp >= 100) { user.petExp = 0; user.petLevel++; alert(`🎉 LEVEL UP! Level ${user.petLevel}!`); }
            dailyChallenge.progress = Math.min(dailyChallenge.progress + 1, dailyChallenge.required);
            if (dailyChallenge.progress >= dailyChallenge.required) { user.petExp += 250; alert(`🔥 UTMANING KLAR! +250 XP!`); dailyChallenge.progress = 0; if (user.petExp >= 100) { user.petExp -= 100; user.petLevel++; alert(`🎉 LEVEL UP! Level ${user.petLevel}!`); } }
            if (user.meetings >= 10 && !user.badges.includes('social')) { user.badges.push('social'); alert('🏆 NY BADGE! Social Butterfly!'); }
            saveUser(); updateLeaderboard(); renderNearby(); renderProfile(); alert(`✅ Möte med ${name}! +15 XP`); renderFeed();
        }
        function renderNearby() {
            const container = document.getElementById('nearbyContainer');
            if (!container) return;
            const percent = (dailyChallenge.progress / dailyChallenge.required) * 100;
            container.innerHTML = `<div class="challenge-card"><div style="color:#39FF14">⚡️ DAGENS UTMANING</div><div style="font-weight:bold; margin:8px 0">${dailyChallenge.title}</div><div class="exp-bar"><div class="exp-fill" style="width:${percent}%"></div></div><div>${dailyChallenge.progress}/${dailyChallenge.required} · 🎁 ${dailyChallenge.reward}</div></div>
            <div><div style="font-weight:bold">📍 VÄNNER I NÄRHETEN</div><div class="friends-grid">${friends.map(f => `<div class="friend-card" onclick="meetFriend('${f.name}')"><div style="font-size:55px">${f.avatar}</div><div style="font-weight:bold">${f.name}</div><div>${f.petEmoji} Lv.${f.petLevel}</div><div style="font-size:11px; color:#888">${f.distance}</div><button class="meet-btn">🤝 MÖT</button></div>`).join('')}</div></div>`;
        }

        // ============ CAMERA ============
        function openCamera() { document.getElementById('cameraModal').classList.remove('hidden'); }
        function closeCamera() { document.getElementById('cameraModal').classList.add('hidden'); selectedImage = null; document.getElementById('cameraContent').innerHTML = `<div style="text-align:center"><div style="font-size:70px; margin-bottom:20px; animation:pulseGlow 2s infinite">🐾</div><button class="btn-primary" onclick="selectImage()">📷 Välj bild</button></div>`; }
        function selectImage() { let input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => { selectedImage = ev.target.result; document.getElementById('cameraContent').innerHTML = `<img src="${selectedImage}" class="preview-img"><div style="display:flex; gap:15px; margin-top:20px"><button class="btn-secondary" onclick="clearImage()">Ta bort</button><button class="btn-primary" onclick="submitPost()">📤 Posta</button></div>`; }; reader.readAsDataURL(file); }; input.click(); }
        function clearImage() { selectedImage = null; document.getElementById('cameraContent').innerHTML = `<div style="text-align:center"><div style="font-size:70px; margin-bottom:20px; animation:pulseGlow 2s infinite">🐾</div><button class="btn-primary" onclick="selectImage()">📷 Välj bild</button></div>`; }
        function submitPost() { if (selectedImage) { posts.unshift({ id: Date.now().toString(), userName: user.name, userAvatar: '👤', petEmoji: PET_TYPES[user.petType].emoji, content: 'Kolla in mitt äventyr! 🔥', likes: 0, timeAgo: 'just nu', image: selectedImage }); selectedImage = null; closeCamera(); renderFeed(); switchTab('feed'); alert('✅ Inlägg publicerat!'); } }

        // ============ TAB NAVIGATION ============
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('feedContainer').style.display = 'none';
            const create = (id, cls) => { if (!document.getElementById(id)) { let d = document.createElement('div'); d.id = id; d.className = cls; d.style.display = 'none'; d.innerHTML = `<div id="${id.replace('Screen','Container')}"></div>`; document.querySelector('.app').insertBefore(d, document.querySelector('.bottom-nav')); } return document.getElementById(id); };
            create('nearbyScreen', 'nearby-screen'); create('profileScreen', 'profile-screen'); create('bountiesScreen', 'bounties-screen');
            const nearby = document.getElementById('nearbyScreen'), profile = document.getElementById('profileScreen'), bounties = document.getElementById('bountiesScreen');
            if (nearby) nearby.style.display = 'none'; if (profile) profile.style.display = 'none'; if (bounties) bounties.style.display = 'none';
            if (tab === 'feed') { document.getElementById('feedContainer').style.display = 'block'; renderFeed(); }
            if (tab === 'nearby') { if (nearby) { nearby.style.display = 'block'; renderNearby(); } }
            if (tab === 'profile') { if (profile) { profile.style.display = 'block'; renderProfile(); } }
            if (tab === 'bounties') { if (bounties) { bounties.style.display = 'block'; renderBounties(); } }
            if (tab === 'shop') { openShop(); return; }
            const icons = { feed: 'navFeedIcon', nearby: 'navNearbyIcon', profile: 'navProfileIcon', bounties: 'navBountiesIcon', shop: 'navShopIcon' };
            const labels = { feed: 'navFeedLabel', nearby: 'navNearbyLabel', profile: 'navProfileLabel', bounties: 'navBountiesLabel', shop: 'navShopLabel' };
            Object.keys(icons).forEach(t => { let ic = document.getElementById(icons[t]); let lb = document.getElementById(labels[t]); if (ic) ic.classList.remove('active'); if (lb) lb.classList.remove('active'); });
            let aic = document.getElementById(icons[tab]); let alb = document.getElementById(labels[tab]); if (aic) aic.classList.add('active'); if (alb) alb.classList.add('active');
        }

        init();
    </script>
</body>
</html>
